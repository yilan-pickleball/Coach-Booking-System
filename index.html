<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匹克球預約與排課系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pickleball: { 50: '#f4fbf0', 100: '#e5f7db', 500: '#62b23f', 600: '#4b912f', 700: '#3c7327' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        .calendar-grid-cell { aspect-ratio: 1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans">

    <!-- 頂部導航欄 (取消桌球Icon，新增角色切換器) -->
    <header class="bg-emerald-700 text-white shadow-md sticky top-0 z-40">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <h1 class="text-lg font-bold tracking-wide">匹克球預約排課系統</h1>
            </div>
            
            <!-- 角色切換選單 -->
            <div class="flex items-center">
                <select id="roleSwitcher" onchange="switchRole(this.value)" class="hidden bg-emerald-800 text-white border border-emerald-600 rounded-lg px-2 py-1 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-emerald-400">
                    <!-- 動態生成選項 -->
                </select>
                <span id="pendingBadge" class="hidden ml-2 bg-amber-500 text-white text-[10px] px-2 py-0.5 rounded-md shadow-sm">教練審核中</span>
            </div>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main class="flex-grow max-w-md w-full mx-auto px-4 py-4 pb-24">
        
        <div id="loadingScreen" class="flex flex-col items-center justify-center py-20 space-y-4">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-emerald-500 border-t-transparent"></div>
            <p class="text-slate-500 text-sm">正在載入系統資料，請稍候...</p>
        </div>

        <section id="dashboardSection" class="hidden space-y-6">
            
            <!-- 快速操作按鈕列 (根據不同角色顯示) -->
            <div id="actionButtons" class="grid grid-cols-2 gap-3">
                <button onclick="showRequestCourseModal()" id="btnStudentRequest" class="hidden flex items-center justify-center space-x-2 bg-emerald-600 hover:bg-emerald-700 text-white py-3 px-4 rounded-xl font-medium shadow-sm transition-all text-sm">
                    <i class="fa-solid fa-calendar-plus"></i><span>提出預約申請</span>
                </button>
                
                <button onclick="showSubmitAvailabilityModal()" id="btnCoachAvailable" class="hidden flex items-center justify-center space-x-2 bg-emerald-600 hover:bg-emerald-700 text-white py-3 px-4 rounded-xl font-medium shadow-sm transition-all text-sm">
                    <i class="fa-solid fa-clock"></i><span>提交授課空檔</span>
                </button>

                <button onclick="showCreateSlotModal()" id="btnAdminCreate" class="hidden flex items-center justify-center space-x-2 bg-purple-600 hover:bg-purple-700 text-white py-3 px-4 rounded-xl font-medium shadow-sm transition-all text-sm">
                    <i class="fa-solid fa-folder-plus"></i><span>手動新增時段</span>
                </button>

                <!-- 學員專屬申請按鈕 -->
                <button onclick="showCoachApplyModal()" id="btnApplyCoach" class="hidden flex items-center justify-center space-x-2 bg-blue-600 hover:bg-blue-700 text-white py-3 px-4 rounded-xl font-medium shadow-sm transition-all text-sm">
                    <i class="fa-solid fa-id-badge"></i><span>申請成為教練</span>
                </button>

                <button onclick="loadSystemData()" class="flex items-center justify-center space-x-2 bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 py-3 px-4 rounded-xl font-medium transition-all text-sm">
                    <i class="fa-solid fa-rotate"></i><span>整理/刷新時段</span>
                </button>
            </div>

            <!-- 行事曆主卡片 -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="bg-slate-50 px-4 py-3 border-b border-slate-100 flex justify-between items-center">
                    <button onclick="changeMonth(-1)" class="p-2 hover:bg-slate-200 rounded-full transition-all">
                        <i class="fa-solid fa-chevron-left text-slate-600"></i>
                    </button>
                    <span id="calendarMonthYear" class="font-bold text-slate-800 text-base">2026 年 07 月</span>
                    <button onclick="changeMonth(1)" class="p-2 hover:bg-slate-200 rounded-full transition-all">
                        <i class="fa-solid fa-chevron-right text-slate-600"></i>
                    </button>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center py-2 text-xs font-semibold text-slate-400 border-b border-slate-50">
                    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                </div>
                <div id="calendarGrid" class="grid grid-cols-7 gap-1 p-2 bg-white">
                    <!-- JS 動態生成 -->
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-3">
                <h3 class="font-bold text-slate-800 text-sm flex items-center space-x-2">
                    <span class="w-1.5 h-4 bg-emerald-500 rounded-full inline-block"></span>
                    <span>我的排程 / 本月所有行程</span>
                </h3>
                <div id="upcomingEventsList" class="space-y-2.5 max-h-60 overflow-y-auto custom-scrollbar">
                    <!-- JS 動態生成 -->
                </div>
            </div>

        </section>
    </main>
    <div id="dateModal" class="fixed inset-0 z-50 hidden bg-black/60 flex items-end sm:items-center justify-center p-0 sm:p-4 transition-all duration-300">
        <div class="absolute inset-0" onclick="closeDateModal()"></div>
        
        <div class="bg-white rounded-t-3xl sm:rounded-2xl shadow-2xl w-full sm:max-w-md p-6 relative z-10 transform translate-y-full sm:translate-y-0 transition-transform duration-300 flex flex-col max-h-[85vh] sm:max-h-[75vh]">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-4 sm:hidden"></div>
            
            <div class="flex justify-between items-center border-b border-slate-100 pb-3 mb-3">
                <div class="flex items-center space-x-2 text-emerald-700">
                    <i class="fa-solid fa-calendar-day text-lg"></i>
                    <h3 id="modalDateTitle" class="text-lg font-bold text-slate-800">詳細資訊</h3>
                </div>
                <button onclick="closeDateModal()" class="text-slate-400 hover:text-slate-600 p-1.5 hover:bg-slate-100 rounded-full transition-colors">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-1 flex-grow custom-scrollbar">
                </div>
        </div>
    </div>

    <div id="coachApplyModal" class="fixed inset-0 z-50 hidden bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 relative">
            <h3 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2"><i class="fa-solid fa-id-badge text-blue-600 mr-2"></i>申請成為教練</h3>
            <form id="coachApplyForm" class="space-y-3.5">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">您的真實姓名</label>
                    <input type="text" id="applyName" required class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="請輸入以便管理員審核">
                </div>
                <div class="flex space-x-2 pt-2">
                    <button type="button" onclick="closeModal('coachApplyModal')" class="w-1/2 border py-2 rounded-lg text-sm text-slate-500">取消</button>
                    <button type="submit" class="w-1/2 bg-blue-600 text-white py-2 rounded-lg text-sm font-semibold">送出申請</button>
                </div>
            </form>
        </div>
    </div>
    <datalist id="locationList">
        <option value="宜蘭國民運動中心"></option>
        <option value="宜蘭運動公園光電風雨球場"></option>
    </datalist>

    <div id="studentRequestModal" class="fixed inset-0 z-50 hidden bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 relative">
            <h3 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2"><i class="fa-solid fa-user-pen text-emerald-600 mr-2"></i>預約申請</h3>
            <form id="studentRequestForm" class="space-y-3.5">
                <div>
                    <label class=" font-semibold text-slate-500 mb-1">課程類型</label>
                    <select id="reqCourseType" class="w-full px-3 py-2 border rounded-lg text-sm">
                        <option value="一對一">一對一</option>
                        <option value="一對二">一對二</option>
                        <option value="一對三">一對三</option>
                        <option value="一對四">一對四</option>
                        <option value="特殊團課(多人)">特殊團課(多人)</option>
                    </select>
                </div>
                <div class="flex space-x-2">
                    <div class="w-1/2">
                        <label class=" font-semibold text-slate-500 mb-1">代表學員</label>
                        <input type="text" id="reqStudentName" required class="w-full px-3 py-2 border rounded-lg text-sm bg-slate-100 placeholder-slate-400" placeholder="填入全名">
                    </div>
                    <div class="w-1/2">
                        <label class=" font-semibold text-slate-500 mb-1">聯絡電話</label>
                        <input type="tel" id="reqPhone" required class="w-full px-3 py-2 border rounded-lg text-sm bg-slate-100 placeholder-slate-400" placeholder="手機號碼">
                    </div>
                </div>
                <div>
                    <label class=" font-semibold text-slate-500 mb-1">日期</label>
                    <input type="date" id="reqDate" required class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class=" font-semibold text-slate-500 mb-1">時段範圍</label>
                    <div class="flex items-center space-x-2">
                        <select id="reqStartTime" required class="w-full px-3 py-2 border rounded-lg text-sm bg-white"></select>
                        <span class="text-slate-400 font-bold">-</span>
                        <select id="reqEndTime" required class="w-full px-3 py-2 border rounded-lg text-sm bg-white"></select>
                    </div>
                </div>
                <div>
                    <label class=" font-semibold text-slate-500 mb-1">指定上課場地</label>
                    <input type="text" id="reqLocation" list="locationList" required class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="選擇或自行填寫地點">
                </div>
                <div class="flex space-x-2 pt-2">
                    <button type="button" onclick="closeModal('studentRequestModal')" class="w-1/2 border py-2 rounded-lg text-sm text-slate-500">取消</button>
                    <button type="submit" class="w-1/2 bg-emerald-600 text-white py-2 rounded-lg text-sm font-semibold">送出申請</button>
                </div>
            </form>
        </div>
    </div>

    <div id="coachAvailabilityModal" class="fixed inset-0 z-50 hidden bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 relative">
            <h3 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2"><i class="fa-solid fa-clock text-emerald-600 mr-2"></i>填寫可授課空檔</h3>
            <form id="coachAvailabilityForm" class="space-y-3.5">
                <div>
                    <label class=" font-semibold text-slate-500 mb-1">日期</label>
                    <input type="date" id="availDate" required class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class=" font-semibold text-slate-500 mb-1">可授課時段</label>
                    <div class="flex items-center space-x-2">
                        <select id="availStartTime" required class="w-full px-3 py-2 border rounded-lg text-sm bg-white"></select>
                        <span class="text-slate-400 font-bold">-</span>
                        <select id="availEndTime" required class="w-full px-3 py-2 border rounded-lg text-sm bg-white"></select>
                    </div>
                </div>
                <div>
                    <label class=" font-semibold text-slate-500 mb-1">希望教學球場</label>
                    <input type="text" id="availLocation" list="locationList" required class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="選擇或自行填寫地點">
                </div>
                <div class="flex space-x-2 pt-2">
                    <button type="button" onclick="closeModal('coachAvailabilityModal')" class="w-1/2 border py-2 rounded-lg text-sm text-slate-500">取消</button>
                    <button type="submit" class="w-1/2 bg-emerald-600 text-white py-2 rounded-lg text-sm font-semibold">送出空檔</button>
                </div>
            </form>
        </div>
    </div>

    <div id="adminCreateModal" class="fixed inset-0 z-50 hidden bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 relative">
            <h3 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2"><i class="fa-solid fa-shield-halved text-purple-600 mr-2"></i>管理員新增時段</h3>
            <form id="adminCreateForm" class="space-y-3.5">
                <div>
                    <label class=" font-semibold text-slate-500 mb-1">課程名稱</label>
                    <input type="text" id="admCourseName" required class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="例：匹克球週末公開團課">
                </div>
               
                    <div class="flex space-x-2">
                    <div class="w-1/2">
                        <label class="block text-xs font-semibold text-slate-500 mb-1">學員代表</label>
                        <input type="text" id="admStudentName" required class="w-full px-3 py-2 border rounded-lg text-sm bg-slate-100 placeholder-slate-400" placeholder="填入全名">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-xs font-semibold text-slate-500 mb-1">聯絡電話</label>
                        <input type="tel" id="admPhone" required class="w-full px-3 py-2 border rounded-lg text-sm bg-slate-100 placeholder-slate-400" placeholder="手機號碼">
                    </div>
                                
                </div>
                <div>
                    <label class=" font-semibold text-slate-500 mb-1">日期</label>
                    <input type="date" id="admDate" required class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class=" font-semibold text-slate-500 mb-1">時段</label>
                    <div class="flex items-center space-x-2">
                        <select id="admStartTime" required class="w-full px-3 py-2 border rounded-lg text-sm bg-white"></select>

                        <select id="admEndTime" required class="w-full px-3 py-2 border rounded-lg text-sm bg-white"></select>
                    </div>
                </div>
                <div>
                    <label class=" font-semibold text-slate-500 mb-1">地點</label>
                    <input type="text" id="admLocation" list="locationList" required class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="選擇或自行填寫地點">
                </div>
                <div>
                    <label class=" font-semibold text-slate-500 mb-1">教練編制</label>
                    <input type="number" id="admRequiredCoaches" value="1" min="1" required class="w-full px-3 py-2 border rounded-lg text-sm">

                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">指派教練 (選填)</label>
                    <select id="admAssignedCoach" class="w-full px-3 py-2 border rounded-lg text-sm bg-white">
                        </select>

    <div id="adminAssignModal" class="fixed inset-0 z-50 hidden bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 relative">
            <h3 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2"><i class="fa-solid fa-user-check text-purple-600 mr-2"></i>指派課程</h3>
            <form id="adminAssignForm" class="space-y-3.5">
                <input type="hidden" id="assignSlotId">
                <div>
                    <label class=" font-semibold text-slate-500 mb-1">課程名稱</label>
                    <input type="text" id="assignCourseName" required class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class=" font-semibold text-slate-500 mb-1">預約學員</label>
                    <input type="text" id="assignStudentName" required class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class=" font-semibold text-slate-500 mb-1">地點</label>
                    <input type="text" id="assignLocation" list="locationList" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">指派教練 (選填)</label>
                    <select id="admAssignedCoach" class="w-full px-3 py-2 border rounded-lg text-sm bg-white">
                        </select>
                </div>
                
                <div class="flex space-x-2 pt-2">
                    <button type="button" onclick="closeModal('adminAssignModal')" class="w-1/2 border py-2 rounded-lg text-sm text-slate-500">取消</button>
                    <button type="submit" class="w-1/2 bg-purple-600 text-white py-2 rounded-lg text-sm font-semibold">確認派課</button>
                </div>
            </form>
        </div>
    </div>
    <!-- JavaScript -->
    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycby2C69Cw97GreQgy28SgqkGkx4w5COOelvSlXXpVxMabnRcNyOZGg_KFGMYfuGl_H0E/exec"; 
        const LIFF_ID = "2010629884-Dil0QZ8F"; 

        let currentUser = {
            LineID: "", Name: "訪客",
            RealRole: "student", // 真實身分
            RealStatus: "Approved", 
            Role: "student"      // 當前操作視角
        };
        let allEvents = [];
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();

        const isMockMode = new URLSearchParams(window.location.search).get('mock') === '1' || window.location.hostname === 'localhost';
        const mockLineId = new URLSearchParams(window.location.search).get('lineId') || "Ud857f472593d4263cdf8353f1e34ef88";

        window.onload = function() { initSystem(); };

        async function initSystem() {
            try {
                if (isMockMode) {
                    currentUser.LineID = mockLineId;
                    currentUser.Name = "測試管理員";
                    await syncUserAndEvents();
                } else {
                    await liff.init({ liffId: LIFF_ID });
                    if (!liff.isLoggedIn()) { liff.login(); return; }
                    const profile = await liff.getProfile();
                    currentUser.LineID = profile.userId;
                    currentUser.Name = profile.displayName;
                    await syncUserAndEvents();
                }
            } catch (error) {
                Swal.fire({ icon: 'error', title: '初始化失敗', text: '請加上 ?mock=1 以本地除錯' });
                currentUser.LineID = mockLineId;
                await syncUserAndEvents();
            }
        }

        async function syncUserAndEvents() {
            try {
                document.getElementById('loadingScreen').classList.remove('hidden');
                
                const response = await callGAS('initSystem', { LineID: currentUser.LineID, Role: "" });
                if (response.status === "success") {
                    const data = response.data;
                    currentUser.RealRole = data.user.realRole;
                    currentUser.RealStatus = data.user.status;

                    if (currentUser.RealRole === 'admin' && currentUser.RealStatus === 'Approved') currentUser.Role = 'admin';
                    else if (currentUser.RealRole === 'coach' && currentUser.RealStatus === 'Approved') currentUser.Role = 'coach';
                    else currentUser.Role = 'student';

                    allEvents = data.events || [];
                    window.coachList = data.coaches || []; // [新增] 將教練名單存到全域變數

                    setupRoleSwitcher();
                    updateUIByRole();
                    generateCoachOptions(); // [新增] 渲染教練下拉選單
                    renderCalendar(currentYear, currentMonth);
                    renderUpcomingEvents();
                } else {
                    throw new Error(response.message);
                }
            } catch (err) {
                Swal.fire('系統同步異常', err.message, 'error');
            } finally {
                document.getElementById('loadingScreen').classList.add('hidden');
            }
        }

        // [新增] 將教練名單寫入管理員的下拉選單
        function generateCoachOptions() {
            let options = '<option value="">(不指派，開放教練自行接課)</option>';
            if(window.coachList){
                window.coachList.forEach(c => {
                    options += `<option value="${c.id}">${c.name}</option>`;
                });
            }
            const admCoachSelect = document.getElementById('admAssignedCoach');
            if (admCoachSelect) admCoachSelect.innerHTML = options;
        }

        async function loadSystemData() {
            try {
                Swal.showLoading();
                const response = await callGAS('getCalendarEvents', { LineID: currentUser.LineID, Role: currentUser.Role });
                if (response.status === "success") {
                    allEvents = response.data || [];
                    renderCalendar(currentYear, currentMonth);
                    renderUpcomingEvents();
                    Swal.close();
                } else { throw new Error(response.message); }
            } catch (err) { Swal.fire('更新失敗', err.message, 'error'); }
        }

        // ==========================================
        // 核心：角色切換選單建置
        // ==========================================
        function setupRoleSwitcher() {
            const switcher = document.getElementById('roleSwitcher');
            const pendingBadge = document.getElementById('pendingBadge');
            switcher.innerHTML = '';
            switcher.classList.remove('hidden');
            pendingBadge.classList.add('hidden');

            if (currentUser.RealRole === 'admin' && currentUser.RealStatus === 'Approved') {
                switcher.innerHTML += `<option value="admin">管理員</option>`;
                switcher.innerHTML += `<option value="coach">教練</option>`;

        function renderCalendar(year, month) {
            const monthNames = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];
            document.getElementById('calendarMonthYear').innerText = `${year} 年 ${monthNames[month]}`;
            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();
            const prevTotalDays = new Date(year, month, 0).getDate();
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            for (let i = firstDayIndex; i > 0; i--) {
                const cell = document.createElement('div');
                cell.className = "text-center text-slate-300 py-2.5 text-xs select-none calendar-grid-cell flex items-center justify-center opacity-40";
                cell.innerText = prevTotalDays - i + 1;
                grid.appendChild(cell);
            }

            for (let day = 1; day <= totalDays; day++) {
                const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const cell = document.createElement('div');
                cell.className = "relative text-center py-1 select-none calendar-grid-cell flex flex-col items-center justify-between border border-slate-50 rounded-lg hover:bg-emerald-50 active:scale-95 transition-all cursor-pointer";
                cell.setAttribute('onclick', `openDateModal('${dateString}')`);
                const isToday = new Date().toDateString() === new Date(year, month, day).toDateString();
                
                const dayLabel = document.createElement('span');
                dayLabel.className = `text-sm font-semibold w-6 h-6 flex items-center justify-center rounded-full mt-0.5 ${isToday ? 'bg-emerald-600 text-white shadow-sm shadow-emerald-200' : 'text-slate-700'}`;
                dayLabel.innerText = day;
                cell.appendChild(dayLabel);

                const dayEvents = allEvents.filter(e => e.Date && formatGASDateString(e.Date) === dateString);
                if (dayEvents.length > 0) {
                    const dots = document.createElement('div');
                    dots.className = "flex space-x-1 mb-1 justify-center w-full px-1 overflow-hidden";
                    dayEvents.slice(0, 3).forEach(ev => {
                        const dot = document.createElement('span');
                        dot.className = "w-1.5 h-1.5 rounded-full";
                        if (ev.Status === 'Open') dot.classList.add('bg-blue-500');
                        else if (ev.Status === 'Full') dot.classList.add('bg-red-500');
                        else if (ev.Status === 'Available') dot.classList.add('bg-green-500');
                        else if (ev.Status === 'Requested') dot.classList.add('bg-amber-500');
                        else dot.classList.add('bg-slate-400');
                        dots.appendChild(dot);
                    });
                    if (dayEvents.length > 3) dots.innerHTML += `<span class="text-[8px] text-slate-400 leading-none">+</span>`;
                    cell.appendChild(dots);
                } else {
                    cell.appendChild(Object.assign(document.createElement('div'), { className: "h-1.5 mb-1" }));
                }
                grid.appendChild(cell);
            }
            const remaining = 42 - grid.children.length;
            for (let i = 1; i <= remaining; i++) {
                const cell = document.createElement('div');
                cell.className = "text-center text-slate-300 py-2.5 text-xs select-none calendar-grid-cell flex items-center justify-center opacity-40";
                cell.innerText = i;
                grid.appendChild(cell);
            }
        }

        function changeMonth(direction) {
            currentMonth += direction;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            else if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar(currentYear, currentMonth);
        }

        async function callGAS(action, data) {
            try {
                const response = await fetch(GAS_WEB_APP_URL, { method: 'POST', mode: 'cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: action, data: data }) });
                return await response.json();
            } catch (err) { throw new Error("無法連接至服務"); }
        }

        function formatGASDateString(dVal) {
            if (!dVal) return "";
            const d = new Date(dVal);
            if (isNaN(d.getTime())) return String(dVal).split('T')[0];
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function executeSignIn(slotId, coachId) {
            const url = `https://your-liff-signin-system.example.com?bookingId=${slotId}&coachId=${coachId}`;
            Swal.fire({ title: '前往簽到', text: `傳輸 BookingID: ${slotId}`, showCancelButton: true, confirmButtonText: '確認跳轉' }).then((res) => {
                if (res.isConfirmed) { liff.isInClient() ? liff.openWindow({ url: url, external: true }) : window.open(url, '_blank'); }
            });
        }

        // ==========================================
        // 統一動態產生時段下拉選單 (為三個身份的表單同時注入選項)
        // ==========================================
        function generateTimeOptions() {
            let options = '<option value="" disabled selected>選擇</option>';
            for (let h = 6; h <= 23; h++) {
                const hour = String(h).padStart(2, '0');
                options += `<option value="${hour}:00">${hour}:00</option>`;
                options += `<option value="${hour}:30">${hour}:30</option>`;
            }
            
            // 一次幫學員、教練、管理員的下拉選單填入選項
            const selectIds = ['reqStartTime', 'reqEndTime', 'availStartTime', 'availEndTime', 'admStartTime', 'admEndTime'];
            selectIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.innerHTML = options;
            });
        }

        // 開啟對應視窗並預載選單
        function showRequestCourseModal() { 
            document.getElementById('studentRequestModal').classList.remove('hidden'); 
            document.getElementById('reqDate').value = new Date(Date.now() + 86400000).toISOString().split('T')[0]; 
            generateTimeOptions(); 
        }

        function showSubmitAvailabilityModal() { 
            document.getElementById('coachAvailabilityModal').classList.remove('hidden'); 
            document.getElementById('availDate').value = new Date().toISOString().split('T')[0]; 
            generateTimeOptions(); // 修復教練視窗不出的關鍵
        }

        function showCreateSlotModal() { 
            document.getElementById('adminCreateModal').classList.remove('hidden'); 
            document.getElementById('admDate').value = new Date().toISOString().split('T')[0]; 
            generateTimeOptions();
        }

        function showAdminAssignModal(slotId, loc) { 
            document.getElementById('assignSlotId').value = slotId; 
            document.getElementById('assignLocation').value = loc || ''; 
            document.getElementById('adminAssignModal').classList.remove('hidden'); 
        }

        function quickFillAvailability(dateStr) { 
            closeDateModal(); 
            showSubmitAvailabilityModal(); 
            document.getElementById('availDate').value = dateStr; 
        }

        // ==========================================
        // 更新表單送出邏輯 (包含結束時間防呆檢查)
        // ==========================================
        
        // 1. 學員申請
       

        // 2. 教練送出空檔
        document.getElementById('coachAvailabilityForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const startTime = document.getElementById('availStartTime').value;
            const endTime = document.getElementById('availEndTime').value;
            if (!startTime || !endTime || startTime >= endTime) return Swal.fire('時段錯誤', '結束時間必須晚於開始時間！', 'warning');

            try {
                Swal.showLoading();
                const res = await callGAS('submitAvailability', { 
                    CoachID: currentUser.LineID, 
                    CoachName: currentUser.Name, 
                    Date: document.getElementById('availDate').value, 
                    TimeRange: `${startTime} - ${endTime}`, 
                    Location: document.getElementById('availLocation').value.trim() 
                });
                if (res.status === "success") { closeModal('coachAvailabilityModal'); Swal.fire('提交成功', '', 'success').then(() => { loadSystemData(); }); }
                else { throw new Error(res.message); }
            } catch (err) { Swal.fire('提交失敗', err.message, 'error'); }
        });

       // 3. 管理員建立時段
           // 3. 管理員建立時段 (統一處理，防止重複監聽)
const adminCreateForm = document.getElementById('adminCreateForm');
adminCreateForm.removeEventListener('submit', handleAdminSubmit); // 先移除可能存在的舊監聽
adminCreateForm.addEventListener('submit', handleAdminSubmit);

async function handleAdminSubmit(e) {
    e.preventDefault();
    console.log("管理員表單送出中..."); // 除錯用：按 F12 打開開發者工具可看到
    
    const startTime = document.getElementById('admStartTime').value;
    const endTime = document.getElementById('admEndTime').value;
    
    if (!startTime || !endTime || startTime >= endTime) {
        Swal.fire('時段錯誤', '結束時間必須晚於開始時間！', 'warning');
        return;
    }

    // 檢查欄位是否存在
    const studentNameEl = document.getElementById('admStudentName');
    const phoneEl = document.getElementById('admPhone');
    if (!studentNameEl || !phoneEl) {
        Swal.fire('錯誤', '找不到表單欄位，請檢查 HTML 是否完整', 'error');
        return;
    }

    const combinedStudentInfo = studentNameEl.value.trim() + ' (' + phoneEl.value.trim() + ')';
    const coachSelect = document.getElementById('admAssignedCoach');
    const assignedCoachId = coachSelect ? coachSelect.value : '';
    const assignedCoachName = (coachSelect && coachSelect.value) ? coachSelect.options[coachSelect.selectedIndex].text : '';

    try {
        Swal.showLoading();
        const res = await callGAS('createSlot', { 
            CreatedBy: currentUser.LineID, 
            CourseName: document.getElementById('admCourseName').value.trim(), 
            StudentName: combinedStudentInfo, 
            Date: document.getElementById('admDate').value, 
            TimeRange: `${startTime} - ${endTime}`, 
            Location: document.getElementById('admLocation').value.trim(), 
            RequiredCoaches: document.getElementById('admRequiredCoaches').value,
            AssignedCoachID: assignedCoachId,
            AssignedCoachName: assignedCoachName
        });
        if (res.status === "success") { 
            closeModal('adminCreateModal'); 
            Swal.fire('建立成功', '', 'success').then(() => { loadSystemData(); }); 
        } else { 
            throw new Error(res.message); 
        }
    } catch (err) { 
        console.error("API 錯誤:", err);
        Swal.fire('建立失敗', err.message, 'error'); 
    }
}
