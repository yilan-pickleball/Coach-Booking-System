<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>匹克球教練排課系統</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    #calendar { max-width: 100%; height: 80vh; margin: 0 auto; font-size: 0.9rem; }
    .fc-event { cursor: pointer; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">

  <nav class="bg-blue-600 text-white p-4 flex justify-between items-center shadow-md">
    <h1 class="text-lg font-bold">🎾 匹克球排課系統</h1>
    <select id="roleSelector" class="bg-blue-700 text-white text-sm rounded p-1 border border-blue-500" onchange="changeRole()">
      <option value="coach">教練視角 (接課)</option>
      <option value="admin">總教練視角 (派課)</option>
    </select>
  </nav>

  <div class="p-4">
    <div id="calendar" class="bg-white rounded-lg shadow-sm p-2 border border-gray-200"></div>
  </div>

  <div id="loader" class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center hidden z-50">
    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-white"></div>
  </div>

  <script>
    // 🔴 您的專屬 GAS 部署網址已幫您填妥
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyltbWiDAsOxuq0udv3xF0iyrEtDRHj9cY_irWlff1iOumR-gXzz0EqYN1DbeGbOS6_nw/exec';
    const LIFF_ID = ''; 

    // 開發用模擬資料
    let myLineId = 'U_TEST_COACH_001'; 
    let myCoachName = '王大明教練';
    let currentRole = 'coach';
    let calendar;

    document.addEventListener('DOMContentLoaded', function() { initCalendar(); });

    function changeRole() {
      currentRole = document.getElementById('roleSelector').value;
      myLineId = currentRole === 'admin' ? 'U_TEST_ADMIN_001' : 'U_TEST_COACH_001';
      myCoachName = currentRole === 'admin' ? '總教練' : '王大明教練';
      calendar.refetchEvents();
    }

    function initCalendar() {
      var calendarEl = document.getElementById('calendar');
      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'timeGridWeek',
        headerToolbar: { left: 'prev,next', center: 'title', right: 'dayGridMonth,timeGridWeek' },
        locale: 'zh-tw', allDaySlot: false, slotMinTime: "08:00:00", slotMaxTime: "22:00:00",
        
        events: function(info, successCallback, failureCallback) {
          showLoader();
          fetch(GAS_URL, {
            method: 'POST', body: JSON.stringify({ action: 'getCalendarEvents', data: { LineID: myLineId, Role: currentRole } })
          })
          .then(r => r.text()).then(text => {
            hideLoader();
            try {
              const res = JSON.parse(text);
              if (res.status === 'success') {
                const events = res.data.map(slot => {
                  const isAvailable = slot.Status === 'Available'; 
                  const isFull = slot.Status === 'Full';
                  const dateStr = String(slot.Date).split('T')[0] || '2026-01-01';
                  const timeParts = String(slot.TimeRange).split('-');
                  
                  const assignedNames = slot.AssignedCoachNames ? slot.AssignedCoachNames.split(',') : [];
                  const currentCount = assignedNames.length;
                  const reqCount = slot.RequiredCoaches;
                  const coachText = currentCount > 0 ? assignedNames.join(', ') : '無人接課';
                  const assignedToMe = slot.AssignedCoachIDs ? slot.AssignedCoachIDs.includes(myLineId) : false;

                  return {
                    id: slot.SlotID, 
                    title: isAvailable ? `[可派課] ${coachText}\n地點: ${slot.Location || '未定'}` : `${slot.CourseName} (${slot.StudentName})\n教練: ${coachText} (${currentCount}/${reqCount})`,
                    start: `${dateStr}T${timeParts[0] || '08:00'}`,
                    end: `${dateStr}T${timeParts[1] || '09:00'}`,
                    color: isAvailable ? '#F59E0B' : (isFull ? '#9CA3AF' : '#10B981'),
                    extendedProps: { 
                      courseName: slot.CourseName, studentName: slot.StudentName, location: slot.Location, 
                      reqCoaches: reqCount, currentCoaches: currentCount, coachNames: coachText,
                      status: slot.Status, assignedToMe: assignedToMe 
                    }
                  };
                });
                successCallback(events);
              } else { Swal.fire('錯誤', res.message, 'error'); failureCallback(); }
            } catch (e) { console.error(text); Swal.fire('資料異常', '請檢查 Console', 'error'); failureCallback(); }
          }).catch(err => { hideLoader(); Swal.fire('連線失敗', err.toString(), 'error'); failureCallback(); });
        },

        dateClick: function(info) {
          let dateStr = info.dateStr;
          let defaultStart = "14:00"; let defaultEnd = "16:00";
          if (dateStr.includes('T')) {
            const d = new Date(dateStr);
            defaultStart = d.toTimeString().substring(0, 5);
            defaultEnd = new Date(d.getTime() + 2 * 3600000).toTimeString().substring(0, 5);
            dateStr = dateStr.split('T')[0];
          }

          if (currentRole === 'coach') {
            Swal.fire({
              title: '提報可接課空檔',
              html: `
                <div class="mt-2 mb-1 text-left text-sm font-bold">日期</div>
                <input type="date" id="swal-date" class="swal2-input !mt-0" value="${dateStr}">
                <div class="mt-4 mb-1 text-left text-sm font-bold">空檔時間 (起 - 迄)</div>
                <div class="flex items-center justify-between gap-2">
                  <input type="time" id="swal-start" class="swal2-input !mt-0 !w-1/2" value="${defaultStart}">
                  <span>至</span>
                  <input type="time" id="swal-end" class="swal2-input !mt-0 !w-1/2" value="${defaultEnd}">
                </div>
                <div class="mt-4 mb-1 text-left text-sm font-bold">偏好地點 (選填)</div>
                <input type="text" id="swal-loc" class="swal2-input !mt-0" placeholder="例：宜蘭國運中心">
              `,
              confirmButtonText: '送出空檔', showCancelButton: true,
              preConfirm: () => ({
                date: document.getElementById('swal-date').value, start: document.getElementById('swal-start').value,
                end: document.getElementById('swal-end').value, loc: document.getElementById('swal-loc').value
              })
            }).then((result) => {
              if (result.isConfirmed) submitAvailability(result.value);
            });
          } else {
            Swal.fire({
              title: '新增排課',
              html: `
                <input type="text" id="swal-course" class="swal2-input !mt-2" placeholder="課程名稱 (例：基礎團班)">
                <input type="text" id="swal-student" class="swal2-input !mt-2" placeholder="學員姓名 (例：陳小明等4人)">
                <div class="flex items-center gap-2 mt-2">
                  <input type="number" id="swal-req" class="swal2-input !mt-0 !w-1/3" placeholder="需求人數" min="1" value="1">
                  <span class="text-sm">位教練</span>
                </div>
                <input type="date" id="swal-date" class="swal2-input !mt-2" value="${dateStr}">
                <div class="flex items-center justify-between gap-2 mt-2">
                  <input type="time" id="swal-start" class="swal2-input !mt-0 !w-1/2" value="${defaultStart}">
                  <span>至</span>
                  <input type="time" id="swal-end" class="swal2-input !mt-0 !w-1/2" value="${defaultEnd}">
                </div>
                <input type="text" id="swal-loc" class="swal2-input !mt-2" placeholder="地點 (例：宜蘭國運中心)">
              `,
              confirmButtonText: '發布課程', showCancelButton: true,
              preConfirm: () => ({
                course: document.getElementById('swal-course').value, student: document.getElementById('swal-student').value,
                req: document.getElementById('swal-req').value, date: document.getElementById('swal-date').value,
                start: document.getElementById('swal-start').value, end: document.getElementById('swal-end').value, loc: document.getElementById('swal-loc').value
              })
            }).then((res) => { if (res.isConfirmed) createSlot(res.value); });
          }
        },

        eventClick: function(info) {
          const ev = info.event; const p = ev.extendedProps;
          
          if (currentRole === 'coach') {
            if (p.status === 'Available' && p.assignedToMe) {
               Swal.fire({ title: '您提報的空檔', text: '目前等待總教練派課中...', icon: 'info', showDenyButton: true, showCancelButton: true, showConfirmButton: false, denyButtonText: '🗑️ 取消提報', cancelButtonText: '關閉'
               }).then(res => { if(res.isDenied) deleteSlot(ev.id); });
            } else if (p.assignedToMe) {
               Swal.fire({ title: '您的課程', text: `地點: ${p.location}`, icon: 'info', showDenyButton: true, showCancelButton: true, confirmButtonText: '✅ 前往簽到', denyButtonText: '❌ 取消接課', cancelButtonText: '關閉'
               }).then(res => { if (res.isConfirmed) Swal.fire('提示', `準備帶入簽到系統\nBookingID: ${ev.id}`, 'success'); else if (res.isDenied) cancelClaim(ev.id); });
            } else if (p.status === 'Open') {
               Swal.fire({ title: '確認接課？', text: `課程: ${p.courseName}\n地點: ${p.location}`, icon: 'question', showCancelButton: true, confirmButtonText: '我要接！', cancelButtonText: '關閉'
               }).then(res => { if (res.isConfirmed) claimSlot(ev.id); });
            } else { Swal.fire({ title: '課程已滿編', icon: 'warning' }); }
          } else { 
            if (p.status === 'Available') {
               Swal.fire({
                 title: '指派課程給此教練',
                 html: `<p class="text-sm mb-2 text-left text-gray-600">教練：${p.coachNames}<br>地點：${p.location || '未定'}</p>
                        <input type="text" id="assign-course" class="swal2-input !mt-0" placeholder="課程名稱 (例：基礎團班)">
                        <input type="text" id="assign-student" class="swal2-input" placeholder="學員姓名 (例：陳小明)">`,
                 showCancelButton: true, confirmButtonText: '✅ 確認派課',
                 preConfirm: () => ({ course: document.getElementById('assign-course').value, student: document.getElementById('assign-student').value })
               }).then(res => { if(res.isConfirmed && res.value.course) assignCourseToAvailability({ SlotID: ev.id, CourseName: res.value.course, StudentName: res.value.student }); });
            } else {
               Swal.fire({ title: '排課資訊', html: `教練：${p.coachNames}`, icon: 'info', showDenyButton: true, showCancelButton: true, showConfirmButton: false, denyButtonText: '🗑️ 刪除此排課', cancelButtonText: '關閉'
               }).then(res => { if (res.isDenied) deleteSlot(ev.id); });
            }
          }
        }
      });
      calendar.render();
    }

    function createSlot(v) {
      showLoader(); fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'createSlot', data: { CourseName: v.course, StudentName: v.student, RequiredCoaches: v.req, Date: v.date, TimeRange: `${v.start}-${v.end}`, Location: v.loc, CreatedBy: myLineId } }) }).then(r => r.json()).then(res => { hideLoader(); if(res.status === 'success') { Swal.fire('成功', '課程已發布', 'success'); calendar.refetchEvents(); } else Swal.fire('失敗', res.message, 'error');});
    }
    function claimSlot(slotId) {
      showLoader(); fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'claimSlot', data: { SlotID: slotId, CoachID: myLineId, CoachName: myCoachName } }) }).then(r => r.json()).then(res => { hideLoader(); if(res.status === 'success') { Swal.fire('成功', '您已成功認領！', 'success'); calendar.refetchEvents(); } else Swal.fire('失敗', res.message, 'error');});
    }
    function deleteSlot(slotId) {
      showLoader(); fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteSlot', data: { SlotID: slotId } }) }).then(r => r.json()).then(res => { hideLoader(); if(res.status === 'success') { Swal.fire('成功', '已移除', 'success'); calendar.refetchEvents(); } else Swal.fire('失敗', res.message, 'error');});
    }
    function cancelClaim(slotId) {
      showLoader(); fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'cancelClaim', data: { SlotID: slotId, CoachID: myLineId } }) }).then(r => r.json()).then(res => { hideLoader(); if(res.status === 'success') { Swal.fire('已取消', '退回開放狀態', 'success'); calendar.refetchEvents(); } else Swal.fire('失敗', res.message, 'error');});
    }
    function submitAvailability(v) {
      showLoader(); fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'submitAvailability', data: { Date: v.date, TimeRange: `${v.start}-${v.end}`, Location: v.loc, CoachID: myLineId, CoachName: myCoachName } }) }).then(r => r.json()).then(res => { hideLoader(); if(res.status === 'success') { Swal.fire('成功', '已送出空檔給總教練', 'success'); calendar.refetchEvents(); } else Swal.fire('失敗', res.message, 'error');});
    }
    function assignCourseToAvailability(payload) {
      showLoader(); fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'assignCourseToAvailability', data: payload }) }).then(r => r.json()).then(res => { hideLoader(); if(res.status === 'success') { Swal.fire('成功', '已指派為正式課程', 'success'); calendar.refetchEvents(); } else Swal.fire('失敗', res.message, 'error');});
    }
    
    function showLoader() { document.getElementById('loader').classList.remove('hidden'); }
    function hideLoader() { document.getElementById('loader').classList.add('hidden'); }
  </script>
</body>
</html>
