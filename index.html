<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>匹克球排課系統</title>
  
  <link rel="preconnect" href="https://script.google.com">
  <link rel="preconnect" href="https://static.line-scdn.net">
  <link rel="preconnect" href="https://cdn.tailwindcss.com">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <style> 
    #calendar { max-width: 100%; height: 85vh; margin: 0 auto; }
    .fc .fc-toolbar-title { font-size: 1rem !important; }
    .fc-event { padding: 4px; border-radius: 6px; cursor: pointer; }
    .fc-event-title { font-size: 0.8rem; font-weight: bold; white-space: normal; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">

  <datalist id="loc-options">
    <option value="宜蘭國民運動中心"></option>
    <option value="宜蘭運動公園光電風雨球場"></option>
  </datalist>

  <nav class="bg-emerald-600 text-white p-4 flex justify-between items-center shadow-md">
    <h1 class="text-lg font-bold" id="nav-title">🍪 匹克球排課系統</h1>
    <div class="flex gap-2 items-center">
      <button id="applyCoachBtn" onclick="applyForCoach()" class="bg-white text-emerald-600 px-3 py-1 rounded text-sm font-bold hidden shadow">教練申請</button>
      <select id="roleSelector" class="bg-emerald-800 text-white text-sm rounded p-1 border border-emerald-500 hidden" onchange="changeRole()"></select>
    </div>
  </nav>

  <div class="p-2"><div id="calendar" class="bg-white rounded-lg shadow-sm p-1 border border-gray-200 hidden"></div></div>
  
  <div id="loader" class="fixed inset-0 bg-gray-900 bg-opacity-80 flex flex-col justify-center items-center hidden z-50">
    <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-blue-400 mb-4"></div>
    <p id="loader-text" class="text-white font-bold text-lg">載入中...</p>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyltbWiDAsOxuq0udv3xF0iyrEtDRHj9cY_irWlff1iOumR-gXzz0EqYN1DbeGbOS6_nw/exec';
    const LIFF_ID = '2010629884-Dil0QZ8F'; 

    let currentRole = 'student'; let realDBRole = ''; let dbStatus = ''; 
    let calendar; let myLineId = ''; let myCoachName = '';
    window.isProcessingFlag = false;
    window.initialEventsCache = null; 

    document.addEventListener('DOMContentLoaded', function() { initializeLiff(); });

    function initializeLiff() {
      liff.init({ liffId: LIFF_ID }).then(() => {
        if (!liff.isLoggedIn()) liff.login();
        else {
          liff.getProfile().then(p => { myLineId=p.userId; myCoachName=p.displayName; initSystemFast(); });
        }
      }).catch(err => { Swal.fire('LIFF 錯誤', err.toString(), 'error'); });
    }

    function initSystemFast() {
      fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'initSystem', data: { LineID: myLineId } }) })
      .then(r => r.json()).then(res => {
        if (res.status === 'success') {
          realDBRole = res.data.user.role; dbStatus = res.data.user.status;
          window.initialEventsCache = parseGasEvents(res.data.events); 
          buildRoleSelector(); setupUI();
        }
      });
    }

    function buildRoleSelector() {
      const sel = document.getElementById('roleSelector'); sel.innerHTML = ''; 
      if (realDBRole === 'admin' && dbStatus === 'Approved') {
        sel.add(new Option('👑 總教練', 'admin')); sel.add(new Option('🏸 教練', 'coach')); sel.add(new Option('👨‍🎓 學員', 'student'));
        currentRole = 'admin'; sel.classList.remove('hidden');
      } else if (realDBRole === 'coach' && dbStatus === 'Approved') {
        sel.add(new Option('🏸 教練', 'coach')); sel.add(new Option('👨‍🎓 學員', 'student'));
        currentRole = 'coach'; sel.classList.remove('hidden');
      } else {
        currentRole = 'student';
        if (dbStatus === 'Pending') Swal.fire('審核中', '您的教練資格正在審核中。', 'info');
        else document.getElementById('applyCoachBtn').classList.remove('hidden');
      }
      sel.value = currentRole;
    }

    function applyForCoach() {
      Swal.fire({ title: '申請成為教練', icon: 'info', showCancelButton: true, confirmButtonText: '確認' })
      .then((res) => { if (res.isConfirmed) callApi('register', { LineID: myLineId, Name: myCoachName, Role: 'coach' }, '已送出審核'); });
    }

    function setupUI() {
      document.getElementById('calendar').classList.remove('hidden');
      updateNavTitle(); initCalendar();
    }

    function updateNavTitle() {
      const roleName = { 'admin': '總教練', 'coach': '教練', 'student': '學員' }[currentRole];
      document.getElementById('nav-title').innerText = `🍪 ${myCoachName} (${roleName})`;
    }

    function changeRole() {
      currentRole = document.getElementById('roleSelector').value;
      updateNavTitle(); calendar.refetchEvents(); 
    }

    function parseGasEvents(dataList) {
      const events = [];
      dataList.forEach(slot => {
        if (!slot.Date || !slot.TimeRange) return; 
        const isAvailable = slot.Status === 'Available'; const isFull = slot.Status === 'Full'; const isReq = slot.Status === 'Requested';
        const dateStr = String(slot.Date).split('T')[0]; const timeParts = String(slot.TimeRange).split('-');
        if (!timeParts[0] || !timeParts[1]) return;
        const assignedNames = slot.AssignedCoachNames ? slot.AssignedCoachNames.split(',') : [];
        const assignedIds = slot.AssignedCoachIDs ? slot.AssignedCoachIDs.split(',') : [];
        events.push({
          id: slot.SlotID, title: isReq ? `[審核中] ${slot.CourseName}` : (isAvailable ? `[可派課] ${assignedNames.join(',')}` : `${slot.CourseName}\n教練: ${assignedNames.join(',')}`),
          start: `${dateStr}T${timeParts[0]}`, end: `${dateStr}T${timeParts[1]}`,
          color: isReq ? '#8B5CF6' : (isAvailable ? '#F59E0B' : (isFull ? '#9CA3AF' : '#10B981')),
          extendedProps: { courseName: slot.CourseName, studentName: slot.StudentName, location: slot.Location, status: slot.Status, assignedToMe: assignedIds.includes(myLineId), createdByMe: slot.CreatedBy === myLineId }
        });
      });
      return events;
    }

    function initCalendar() {
      if (calendar) calendar.destroy(); 
      calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: window.innerWidth < 768 ? 'timeGridDay' : 'timeGridWeek',
        headerToolbar: { left: 'prev,next', center: 'title', right: '' }, locale: 'zh-tw', allDaySlot: false, slotMinTime: "08:00:00", slotMaxTime: "22:00:00",
        events: function(info, successCallback, failureCallback) {
          if (window.initialEventsCache) { successCallback(window.initialEventsCache); window.initialEventsCache = null; return; }
          fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getCalendarEvents', data: { LineID: myLineId, Role: currentRole } }) })
          .then(r => r.json()).then(res => { successCallback(parseGasEvents(res.data)); });
        },
        dateClick: function(info) {
          if (window.isProcessingFlag) return; 
          if (currentRole === 'student') {
             Swal.fire({
              title: '預約課程', html: `<select id="swal-type" class="swal2-input"><option>一對一</option><option>一對二</option></select><input type="text" id="swal-student" class="swal2-input" placeholder="姓名"><input type="tel" id="swal-phone" class="swal2-input" placeholder="電話"><input list="loc-options" id="swal-loc" class="swal2-input" placeholder="地點">`, showCancelButton: true,
              preConfirm: () => ({ type: document.getElementById('swal-type').value, student: document.getElementById('swal-student').value, phone: document.getElementById('swal-phone').value, date: info.dateStr.split('T')[0], start: '14:00', end: '16:00', loc: document.getElementById('swal-loc').value })
            }).then((res) => { if(res.isConfirmed) callApi('requestCourse', { CourseType: res.value.type, StudentName: res.value.student, Phone: res.value.phone, Date: res.value.date, TimeRange: '14:00-16:00', Location: res.value.loc, CreatedBy: myLineId }, '已送出'); });
          }
        },
        eventClick: function(info) {
           // ... (這裡補上您上一次完整的 eventClick 處理邏輯，確保包含 claimSlot 與 assign 功能)
           // 為了確保您複製正確，請務必確認這一段邏輯在您的檔案中是完整的。
        }
      });
      calendar.render();
    }
    // (補齊 callApi 與 helper functions)
    function callApi(a, p, msg) { window.isProcessingFlag=true; fetch(GAS_URL, {method:'POST', body: JSON.stringify({action:a, data:p})}).then(r=>r.json()).then(res=>{ window.isProcessingFlag=false; Swal.fire('成功', msg, 'success'); calendar.refetchEvents(); }); }
  </script>
</body>
</html>
