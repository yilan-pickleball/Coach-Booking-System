<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>匹克球排課系統</title>
  
  <link rel="preconnect" href="https://script.google.com">
  <link rel="preconnect" href="https://cdn.tailwindcss.com">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <style> 
    /* 🚀 手機版好讀優化 */
    #calendar { max-width: 100%; height: 85vh; margin: 0 auto; }
    .fc .fc-toolbar-title { font-size: 1rem !important; }
    .fc .fc-event { padding: 4px; border-radius: 6px; cursor: pointer; }
    .fc-event-title { font-size: 0.8rem; font-weight: bold; white-space: normal; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">

  <datalist id="loc-options">
    <option value="宜蘭國民運動中心"></option>
    <option value="宜蘭運動公園光電風雨球場"></option>
  </datalist>

  <nav class="bg-emerald-600 text-white p-4 flex justify-between items-center shadow-md">
    <h1 class="text-lg font-bold" id="nav-title">🥒 匹克球排課系統</h1>
    <div class="flex gap-2 items-center">
      <button id="applyCoachBtn" onclick="applyForCoach()" class="bg-white text-emerald-600 px-3 py-1 rounded text-sm font-bold hidden shadow">教練申請</button>
      <select id="roleSelector" class="bg-emerald-800 text-white text-sm rounded p-1 border border-emerald-500 hidden" onchange="changeRole()"></select>
    </div>
  </nav>

  <div class="p-2"><div id="calendar" class="bg-white rounded-lg shadow-sm p-1 border border-gray-200 hidden"></div></div>
  
  <div id="loader" class="fixed inset-0 bg-gray-900 bg-opacity-80 flex flex-col justify-center items-center hidden z-50">
    <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-blue-400 mb-4"></div>
    <p id="loader-text" class="text-white font-bold text-lg">載入中...</p>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyltbWiDAsOxuq0udv3xF0iyrEtDRHj9cY_irWlff1iOumR-gXzz0EqYN1DbeGbOS6_nw/exec';
    const LIFF_ID = '2010629884-Dil0QZ8F'; 

    let currentRole = 'student'; let realDBRole = ''; let dbStatus = ''; 
    let calendar; let myLineId = ''; let myCoachName = '';
    window.isProcessingFlag = false;

    document.addEventListener('DOMContentLoaded', function() { initializeLiff(); });

    function initializeLiff() {
      liff.init({ liffId: LIFF_ID }).then(() => {
        if (!liff.isLoggedIn()) liff.login();
        else liff.getProfile().then(p => { myLineId=p.userId; myCoachName=p.displayName; initSystemFast(); });
      });
    }

    function initSystemFast() {
      fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'initSystem', data: { LineID: myLineId } }) })
      .then(r => r.json()).then(res => {
        if (res.status === 'success') {
          realDBRole = res.data.user.role; dbStatus = res.data.user.status;
          buildRoleSelector(); setupUI(res.data.events);
        }
      });
    }

    function setupUI(events) {
      document.getElementById('calendar').classList.remove('hidden');
      updateNavTitle();
      
      // ✅ 關鍵優化：手機版預設「日檢視」才不會太擠
      const isMobile = window.innerWidth < 768;
      var calendarEl = document.getElementById('calendar');
      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: isMobile ? 'timeGridDay' : 'timeGridWeek',
        headerToolbar: { left: 'prev,next', center: 'title', right: isMobile ? '' : 'timeGridWeek,timeGridDay' },
        locale: 'zh-tw', allDaySlot: false, slotMinTime: "08:00:00", slotMaxTime: "22:00:00",
        events: parseGasEvents(events),
        dateClick: function(info) { /* ...原排課邏輯... */ },
        eventClick: function(info) { /* ...原事件邏輯... */ }
      });
      calendar.render();
      hideLoader();
    }
    
    // (其餘 API 與 UI 邏輯保持不變...)
    // 記得將之前的 callApi, dateClick, eventClick 邏輯補上，為節省版面我先略過重複段落
  </script>
</body>
</html>
