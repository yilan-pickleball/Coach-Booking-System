<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匹克球預約與排課系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tailwind CSS Config for theme customization -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pickleball: {
                            50: '#f4fbf0',
                            100: '#e5f7db',
                            200: '#ceefbb',
                            300: '#ade292',
                            400: '#87cf65',
                            500: '#62b23f',
                            600: '#4b912f',
                            700: '#3c7327',
                            800: '#325c23',
                            900: '#2c4f21',
                            950: '#142c0d',
                        }
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 for beautiful modern alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- LINE LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* Custom scrollbar for mobile calendar items */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        /* Grid styling */
        .calendar-grid-cell {
            aspect-ratio: 1;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans">

    <!-- 頂部導航欄 (Header) -->
    <header class="bg-emerald-700 text-white shadow-md sticky top-0 z-40">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa-solid fa-table-tennis-paddle-ball text-pickleball-300 text-2xl"></i>
                <h1 class="text-lg font-bold tracking-wide">匹克球預約排課系統</h1>
            </div>
            <!-- 使用者角色標籤 -->
            <div id="userBadge" class="hidden flex items-center space-x-1.5 bg-emerald-800 px-2.5 py-1 rounded-full text-xs font-semibold">
                <i class="fa-solid fa-circle text-gray-400 text-[10px]" id="roleDot"></i>
                <span id="roleLabel">讀取中...</span>
            </div>
        </div>
    </header>

    <!-- 主要內容區 (適配手機寬度) -->
    <main class="flex-grow max-w-md w-full mx-auto px-4 py-4 pb-24">
        
        <!-- Loading 狀態遮罩 -->
        <div id="loadingScreen" class="flex flex-col items-center justify-center py-20 space-y-4">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-emerald-500 border-t-transparent"></div>
            <p class="text-slate-500 text-sm">正在載入系統資料，請稍候...</p>
        </div>

        <!-- 1. 註冊與狀態審核區 (Register & Pending View) -->
        <section id="registerSection" class="hidden space-y-6">
            <!-- 狀態 A: 尚未註冊 (None) -->
            <div id="registerFormBox" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-pickleball-100 text-pickleball-600 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i class="fa-solid fa-address-card text-2xl"></i>
                    </div>
                    <h2 class="text-xl font-bold text-slate-800">歡迎加入系統</h2>
                    <p class="text-slate-500 text-xs mt-1">首次使用請先填寫基本資料，管理員審核通過後即可開始預約。</p>
                </div>
                
                <form id="registerForm" class="space-y-4">
                    <div>
                        <label class="block text-slate-700 text-sm font-semibold mb-1">真實姓名</label>
                        <input type="text" id="regName" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all text-sm" placeholder="請輸入您的真實姓名">
                    </div>
                    <div>
                        <label class="block text-slate-700 text-sm font-semibold mb-1">身分角色</label>
                        <select id="regRole" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all text-sm">
                            <option value="student">我是學員 (可申請預約課程)</option>
                            <option value="coach">我是教練 (提供空檔/承接課程)</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl transition-all shadow-md shadow-emerald-100 mt-2 text-sm">
                        確認送出申請
                    </button>
                </form>
            </div>

            <!-- 狀態 B: 審核中 (Pending) -->
            <div id="pendingReviewBox" class="hidden bg-white p-8 rounded-2xl shadow-sm border border-slate-100 text-center">
                <div class="w-16 h-16 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse">
                    <i class="fa-solid fa-clock-rotate-left text-2xl"></i>
                </div>
                <h2 class="text-xl font-bold text-slate-800">資料審核中</h2>
                <p class="text-slate-500 text-sm mt-2 px-4 leading-relaxed">
                    您的註冊申請已成功送出！請耐心等待管理員為您開啟權限。
                </p>
                <div class="mt-6 text-xs text-slate-400 bg-slate-50 py-2 rounded-lg">
                    系統 UID: <span id="pendingUid" class="font-mono"></span>
                </div>
            </div>
        </section>

        <!-- 2. 主功能區 (Dashboard View - 審核通過 Approved 後顯示) -->
        <section id="dashboardSection" class="hidden space-y-6">
            
            <!-- 快速操作按鈕列 (根據不同角色顯示) -->
            <div id="actionButtons" class="grid grid-cols-2 gap-3">
                <!-- 學員按鈕 -->
                <button onclick="showRequestCourseModal()" id="btnStudentRequest" class="hidden flex items-center justify-center space-x-2 bg-emerald-600 hover:bg-emerald-700 text-white py-3 px-4 rounded-xl font-medium shadow-sm transition-all text-sm">
                    <i class="fa-solid fa-calendar-plus"></i>
                    <span>提出預約申請</span>
                </button>
                
                <!-- 教練按鈕 -->
                <button onclick="showSubmitAvailabilityModal()" id="btnCoachAvailable" class="hidden flex items-center justify-center space-x-2 bg-emerald-600 hover:bg-emerald-700 text-white py-3 px-4 rounded-xl font-medium shadow-sm transition-all text-sm">
                    <i class="fa-solid fa-clock"></i>
                    <span>提交授課空檔</span>
                </button>

                <!-- 管理員按鈕 -->
                <button onclick="showCreateSlotModal()" id="btnAdminCreate" class="hidden flex items-center justify-center space-x-2 bg-purple-600 hover:bg-purple-700 text-white py-3 px-4 rounded-xl font-medium shadow-sm transition-all text-sm">
                    <i class="fa-solid fa-folder-plus"></i>
                    <span>手動新增時段</span>
                </button>

                <!-- 共用：刷新 -->
                <button onclick="loadSystemData()" class="flex items-center justify-center space-x-2 bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 py-3 px-4 rounded-xl font-medium transition-all text-sm">
                    <i class="fa-solid fa-rotate"></i>
                    <span>整理/刷新時段</span>
                </button>
            </div>

            <!-- 行事曆主卡片 -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <!-- 行事曆標頭 (切換月份) -->
                <div class="bg-slate-50 px-4 py-3 border-b border-slate-100 flex justify-between items-center">
                    <button onclick="changeMonth(-1)" class="p-2 hover:bg-slate-200 rounded-full transition-all">
                        <i class="fa-solid fa-chevron-left text-slate-600"></i>
                    </button>
                    <span id="calendarMonthYear" class="font-bold text-slate-800 text-base">2026 年 07 月</span>
                    <button onclick="changeMonth(1)" class="p-2 hover:bg-slate-200 rounded-full transition-all">
                        <i class="fa-solid fa-chevron-right text-slate-600"></i>
                    </button>
                </div>

                <!-- 星期標頭 -->
                <div class="grid grid-cols-7 gap-1 text-center py-2 text-xs font-semibold text-slate-400 border-b border-slate-50">
                    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                </div>

                <!-- 行事曆日期網格 -->
                <div id="calendarGrid" class="grid grid-cols-7 gap-1 p-2 bg-white">
                    <!-- JS 動態生成 -->
                </div>
            </div>

            <!-- 本月行程列表 (底部快速預覽) -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-3">
                <h3 class="font-bold text-slate-800 text-sm flex items-center space-x-2">
                    <span class="w-1.5 h-4 bg-emerald-500 rounded-full inline-block"></span>
                    <span>我的排程 / 本月所有行程</span>
                </h3>
                <div id="upcomingEventsList" class="space-y-2.5 max-h-60 overflow-y-auto custom-scrollbar">
                    <!-- JS 動態生成 -->
                </div>
            </div>

        </section>
    </main>

    <!-- 底部資訊與版權 -->
    <footer class="bg-slate-100 text-center py-4 border-t border-slate-200 text-xs text-slate-400 mt-auto">
        <p>© 2026 宜蘭匹克球培訓基地 - 全端資深架構設計</p>
    </footer>

    <!-- ========================================================================= -->
    <!-- 👑 核心彈出式詳細資訊窗框 (Responsive Detail Modal) -->
    <!-- ========================================================================= -->
    <div id="dateModal" class="fixed inset-0 z-50 hidden bg-black/60 flex items-end sm:items-center justify-center p-0 sm:p-4 transition-all duration-300">
        <!-- 遮罩背景點擊關閉 -->
        <div class="absolute inset-0" onclick="closeDateModal()"></div>
        
        <!-- 視窗主體：手機版上浮(Bottom Sheet)，電腦版置中 -->
        <div class="bg-white rounded-t-3xl sm:rounded-2xl shadow-2xl w-full sm:max-w-md p-6 relative z-10 transform translate-y-full sm:translate-y-0 transition-transform duration-300 flex flex-col max-h-[85vh] sm:max-h-[75vh]">
            <!-- 手機版拖動條 -->
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-4 sm:hidden"></div>
            
            <!-- 標題與關閉按鈕 -->
            <div class="flex justify-between items-center border-b border-slate-100 pb-3 mb-3">
                <div class="flex items-center space-x-2 text-emerald-700">
                    <i class="fa-solid fa-calendar-day text-lg"></i>
                    <h3 id="modalDateTitle" class="text-lg font-bold text-slate-800">詳細資訊</h3>
                </div>
                <button onclick="closeDateModal()" class="text-slate-400 hover:text-slate-600 p-1.5 hover:bg-slate-100 rounded-full transition-colors">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            
            <!-- 行程列表容器 -->
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-1 flex-grow custom-scrollbar">
                <!-- JS 動態寫入內容 -->
            </div>
        </div>
    </div>

    <!-- ========================================================================= -->
    <!-- 🚀 其他各種功能彈出視窗 (學員預約、教練空檔、管理員新增) -->
    <!-- ========================================================================= -->
    
    <!-- A. 學員提出預約申請 Modal -->
    <div id="studentRequestModal" class="fixed inset-0 z-50 hidden bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 relative">
            <h3 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2"><i class="fa-solid fa-user-pen text-emerald-600 mr-2"></i>學員課程預約申請</h3>
            <form id="studentRequestForm" class="space-y-3.5">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">課程類型 / 名稱</label>
                    <select id="reqCourseType" class="w-full px-3 py-2 border rounded-lg text-sm">
                        <option value="【學員預約】匹克球一對一家教課">匹克球一對一家教課</option>
                        <option value="【學員預約】匹克球雙人家教課">匹克球雙人家教課</option>
                        <option value="【學員預約】團課培訓班 (多人)">團課培訓班 (多人)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">聯絡人真實姓名與電話</label>
                    <input type="text" id="reqStudentName" required class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="範例：王大同 (0912-345678)">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">日期 (YYYY-MM-DD)</label>
                    <input type="date" id="reqDate" required class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">時段範圍 (例如: 14:00 - 16:00)</label>
                    <input type="text" id="reqTimeRange" required class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="請輸入欲預約上課的時段">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">指定上課場地</label>
                    <input type="text" id="reqLocation" required class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="請指定球場或練習場地點">
                </div>
                <div class="flex space-x-2 pt-2">
                    <button type="button" onclick="closeModal('studentRequestModal')" class="w-1/2 border py-2 rounded-lg text-sm text-slate-500">取消</button>
                    <button type="submit" class="w-1/2 bg-emerald-600 text-white py-2 rounded-lg text-sm font-semibold">送出申請</button>
                </div>
            </form>
        </div>
    </div>

    <!-- B. 教練提交空檔 Modal -->
    <div id="coachAvailabilityModal" class="fixed inset-0 z-50 hidden bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 relative">
            <h3 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2"><i class="fa-solid fa-clock text-emerald-600 mr-2"></i>教練填寫可授課空檔</h3>
            <form id="coachAvailabilityForm" class="space-y-3.5">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">授課日期</label>
                    <input type="date" id="availDate" required class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">可授課時段 (例如: 09:00 - 11:00)</label>
                    <input type="text" id="availTimeRange" required class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="請輸入您方便上課的時間">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">希望教學球場 / 地點</label>
                    <input type="text" id="availLocation" required class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="請填寫地點(強制地點規範)">
                </div>
                <div class="flex space-x-2 pt-2">
                    <button type="button" onclick="closeModal('coachAvailabilityModal')" class="w-1/2 border py-2 rounded-lg text-sm text-slate-500">取消</button>
                    <button type="submit" class="w-1/2 bg-emerald-600 text-white py-2 rounded-lg text-sm font-semibold">送出空檔</button>
                </div>
            </form>
        </div>
    </div>

    <!-- C. 管理員直接新增課程時段 Modal -->
    <div id="adminCreateModal" class="fixed inset-0 z-50 hidden bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 relative">
            <h3 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2"><i class="fa-solid fa-shield-halved text-purple-600 mr-2"></i>系統管理員新增時段</h3>
            <form id="adminCreateForm" class="space-y-3.5">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">課程名稱</label>
                    <input type="text" id="admCourseName" required class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="例：匹克球週末公開團課">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">學員代表名稱 / 資訊</label>
                    <input type="text" id="admStudentName" required class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="例：林小明 或 團體課學員">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">上課日期</label>
                    <input type="date" id="admDate" required class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">上課時段</label>
                    <input type="text" id="admTimeRange" required class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="例：10:00 - 12:00">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">上課地點</label>
                    <input type="text" id="admLocation" required class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="請填寫地點">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">所需教練編制人數</label>
                    <input type="number" id="admRequiredCoaches" value="1" min="1" required class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div class="flex space-x-2 pt-2">
                    <button type="button" onclick="closeModal('adminCreateModal')" class="w-1/2 border py-2 rounded-lg text-sm text-slate-500">取消</button>
                    <button type="submit" class="w-1/2 bg-purple-600 text-white py-2 rounded-lg text-sm font-semibold">建立時段</button>
                </div>
            </form>
        </div>
    </div>

    <!-- D. 管理員指派課程 Modal (針對教練空檔 Aallable 的時段) -->
    <div id="adminAssignModal" class="fixed inset-0 z-50 hidden bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 relative">
            <h3 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2"><i class="fa-solid fa-user-check text-purple-600 mr-2"></i>為教練空檔指派課程</h3>
            <form id="adminAssignForm" class="space-y-3.5">
                <input type="hidden" id="assignSlotId">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">指派課程名稱</label>
                    <input type="text" id="assignCourseName" required class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="例：學員王小華一對一家教課">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">預約學員資訊</label>
                    <input type="text" id="assignStudentName" required class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="例：王小華 (0988-123456)">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">授課地點</label>
                    <input type="text" id="assignLocation" class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="留空則沿用教練填寫之地點">
                </div>
                <div class="flex space-x-2 pt-2">
                    <button type="button" onclick="closeModal('adminAssignModal')" class="w-1/2 border py-2 rounded-lg text-sm text-slate-500">取消</button>
                    <button type="submit" class="w-1/2 bg-purple-600 text-white py-2 rounded-lg text-sm font-semibold">確認派課</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ========================================================================= -->
    <!-- ⚙️ 系統核心 JavaScript (全端運作與同步核心) -->
    <!-- ========================================================================= -->
    <script>
        // ----------------------------------------------------
        // 1. 基本設定（請將此設定改為您的 GAS Web App API 網址）
        // ----------------------------------------------------
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycby2C69Cw97GreQgy28SgqkGkx4w5COOelvSlXXpVxMabnRcNyOZGg_KFGMYfuGl_H0E/exec"; // 請替換成您在 code.gs 部署後的 Web App URL
        const LIFF_ID = "2010629884-Dil0QZ8F"; // 請替換成您的 LINE Developers 中的 LIFF ID

        // ----------------------------------------------------
        // 2. 全域狀態管理
        // ----------------------------------------------------
        let currentUser = {
            LineID: "",
            Name: "訪客",
            Role: "student",
            Status: "None"
        };
        let allEvents = []; // 儲存全月載入的課程時段
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth(); // 0 - 11

        // 測試模式 (為了方便在 PC、Local 甚至 LINE 開發除錯，可利用 url 參數 bypass LIFF)
        const isMockMode = new URLSearchParams(window.location.search).get('mock') === '1' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const mockLineId = new URLSearchParams(window.location.search).get('lineId') || "Ud857f472593d4263cdf8353f1e34ef88"; // 預設最高管理員測試

        // ----------------------------------------------------
        // 3. 初始化載入
        // ----------------------------------------------------
        window.onload = function() {
            initSystem();
        };

        async function initSystem() {
            try {
                if (isMockMode) {
                    console.warn("⚠️ 目前為開發者測試/模擬模式。模擬的 LINE ID:", mockLineId);
                    currentUser.LineID = mockLineId;
                    currentUser.Name = "測試管理員";
                    await syncUserAndEvents();
                } else {
                    // 初始化 LINE LIFF
                    await liff.init({ liffId: LIFF_ID });
                    if (!liff.isLoggedIn()) {
                        liff.login();
                        return;
                    }
                    const profile = await liff.getProfile();
                    currentUser.LineID = profile.userId;
                    currentUser.Name = profile.displayName;
                    await syncUserAndEvents();
                }
            } catch (error) {
                console.error("LIFF / 系統載入失敗:", error);
                Swal.fire({
                    icon: 'error',
                    title: '初始化失敗',
                    text: '請確認您的 LINE 開啟環境，或是 code.gs API Web App 部署是否正確。',
                    confirmButtonText: '確定'
                });
                // 降級載入，啟用 Mock 輔助開發
                currentUser.LineID = mockLineId;
                currentUser.Name = "降級模擬者";
                await syncUserAndEvents();
            }
        }

        // 與後端 code.gs 同步使用者權限角色與事件
        async function syncUserAndEvents() {
            try {
                document.getElementById('loadingScreen').classList.remove('hidden');
                
                const response = await callGAS('initSystem', { LineID: currentUser.LineID });
                if (response.status === "success") {
                    const data = response.data;
                    currentUser.Role = data.user.role;
                    currentUser.Status = data.user.status;
                    allEvents = data.events || [];

                    updateUIByRole();
                    renderCalendar(currentYear, currentMonth);
                    renderUpcomingEvents();
                } else {
                    throw new Error(response.message);
                }
            } catch (err) {
                console.error("同步失敗:", err);
                Swal.fire('系統同步異常', err.message, 'error');
            } finally {
                document.getElementById('loadingScreen').classList.add('hidden');
            }
        }

        // 單獨更新與重新載入事件 (不重新檢查權限)
        async function loadSystemData() {
            try {
                Swal.showLoading();
                const response = await callGAS('getCalendarEvents', { LineID: currentUser.LineID, Role: currentUser.Role });
                if (response.status === "success") {
                    allEvents = response.data || [];
                    renderCalendar(currentYear, currentMonth);
                    renderUpcomingEvents();
                    Swal.close();
                    Swal.fire({ icon: 'success', title: '更新完成', timer: 1000, showConfirmButton: false });
                } else {
                    throw new Error(response.message);
                }
            } catch (err) {
                Swal.fire('更新失敗', err.message, 'error');
            }
        }

            document.getElementById('dashboardSection').classList.add('hidden');

                document.getElementById('registerFormBox').classList.remove('hidden');
                document.getElementById('pendingReviewBox').classList.add('hidden');

        // ----------------------------------------------------
        // 5. 行事曆渲染模組 (Month View Grid)
        // ----------------------------------------------------
        function renderCalendar(year, month) {
            const monthNames = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];
            document.getElementById('calendarMonthYear').innerText = `${year} 年 ${monthNames[month]}`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();
            const prevTotalDays = new Date(year, month, 0).getDate();

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            // 1. 前面月份的空置格填塞
            for (let i = firstDayIndex; i > 0; i--) {
                const prevDay = prevTotalDays - i + 1;
                const cell = document.createElement('div');
                cell.className = "text-center text-slate-300 py-2.5 text-xs select-none calendar-grid-cell flex items-center justify-center opacity-40";
                cell.innerText = prevDay;
                grid.appendChild(cell);
            }

            // 2. 當月日期繪製
            for (let day = 1; day <= totalDays; day++) {
                const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const cell = document.createElement('div');
                
                // 基礎結構
                cell.className = "relative text-center py-1 select-none calendar-grid-cell flex flex-col items-center justify-between border border-slate-50 rounded-lg hover:bg-emerald-50 active:scale-95 transition-all cursor-pointer";
                cell.setAttribute('onclick', `openDateModal('${dateString}')`);

                // 判斷今日
                const isToday = new Date().toDateString() === new Date(year, month, day).toDateString();
                
                // 日期文字標籤
                const dayLabel = document.createElement('span');
                dayLabel.className = `text-sm font-semibold w-6 h-6 flex items-center justify-center rounded-full mt-0.5 ${isToday ? 'bg-emerald-600 text-white shadow-sm shadow-emerald-200' : 'text-slate-700'}`;
                dayLabel.innerText = day;
                cell.appendChild(dayLabel);

                // 計算當日事件數與狀態指示點
                const dayEvents = allEvents.filter(e => {
                    if (!e.Date) return false;
                    // 標準化格式比對
                    const eventDateStr = formatGASDateString(e.Date);
                    return eventDateStr === dateString;
                });

                if (dayEvents.length > 0) {
                    const dotsContainer = document.createElement('div');
                    dotsContainer.className = "flex space-x-1 mb-1 justify-center w-full px-1 overflow-hidden";
                    
                    // 根據狀態繪製精美小圓點
                    dayEvents.slice(0, 3).forEach(ev => {
                        const dot = document.createElement('span');
                        dot.className = "w-1.5 h-1.5 rounded-full";
                        if (ev.Status === 'Open') dot.classList.add('bg-blue-500');
                        else if (ev.Status === 'Full') dot.classList.add('bg-red-500');
                        else if (ev.Status === 'Available') dot.classList.add('bg-green-500');
                        else if (ev.Status === 'Requested') dot.classList.add('bg-amber-500');
                        else dot.classList.add('bg-slate-400');
                        dotsContainer.appendChild(dot);
                    });
                    
                    // 事件數提示
                    if (dayEvents.length > 3) {
                        const plusSign = document.createElement('span');
                        plusSign.className = "text-[8px] text-slate-400 leading-none";
                        plusSign.innerText = "+";
                        dotsContainer.appendChild(plusSign);
                    }
                    cell.appendChild(dotsContainer);
                } else {
                    // 空白格預留空間避免版面變形
                    const spacer = document.createElement('div');
                    spacer.className = "h-1.5 mb-1";
                    cell.appendChild(spacer);
                }

                grid.appendChild(cell);
            }

            // 3. 後面月份的空置格填塞以維持一貫的 6 橫列
            const totalCells = grid.children.length;
            const remaining = 42 - totalCells;
            for (let i = 1; i <= remaining; i++) {
                const cell = document.createElement('div');
                cell.className = "text-center text-slate-300 py-2.5 text-xs select-none calendar-grid-cell flex items-center justify-center opacity-40";
                cell.innerText = i;
                grid.appendChild(cell);
            }
        }

        // 月份切換
        function changeMonth(direction) {
            currentMonth += direction;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            } else if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar(currentYear, currentMonth);
        }

        // ----------------------------------------------------
        // 6. 核心上浮式詳細行程 Modal 模組
        // ----------------------------------------------------
        function openDateModal(selectedDate) {
            const modal = document.getElementById('dateModal');
            const content = document.getElementById('modalContent');
            const title = document.getElementById('modalDateTitle');

            title.innerHTML = `<span>${selectedDate} 日期日程</span>`;
            content.innerHTML = '';

            // 取得該日期所有事件並排序
            const dayEvents = allEvents.filter(e => {
                if (!e.Date) return false;
                return formatGASDateString(e.Date) === selectedDate;
            }).sort((a,b) => String(a.TimeRange).localeCompare(String(b.TimeRange)));

            if (dayEvents.length === 0) {
                content.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-10 text-slate-400">
                        <i class="fa-solid fa-circle-info text-3xl mb-2 text-slate-300"></i>
                        <p class="text-sm">本日無任何排程時段</p>
                        ${currentUser.Role === 'coach' ? `<p class="text-xs text-emerald-600 mt-2 hover:underline cursor-pointer" onclick="quickFillAvailability('${selectedDate}')">+ 點此快速提交本日空檔</p>` : ''}
                    </div>`;
            } else {
                dayEvents.forEach(event => {
                    // 狀態與樣式配置
                    let statusBadgeClass = "bg-slate-100 text-slate-600";
                    let statusText = event.Status;
                    let borderClass = "border-slate-100";

                    if (event.Status === 'Open') {
                        statusBadgeClass = "bg-blue-50 text-blue-600 border border-blue-200";
                        statusText = "開放教練接課 (Open)";
                        borderClass = "border-l-4 border-l-blue-500";
                    } else if (event.Status === 'Full') {
                        statusBadgeClass = "bg-red-50 text-red-600 border border-red-100";
                        statusText = "預約客滿 (Full)";
                        borderClass = "border-l-4 border-l-red-500";
                    } else if (event.Status === 'Available') {
                        statusBadgeClass = "bg-green-50 text-green-600 border border-green-200";
                        statusText = "教練填寫空檔 (Available)";
                        borderClass = "border-l-4 border-l-green-500";
                    } else if (event.Status === 'Requested') {
                        statusBadgeClass = "bg-amber-50 text-amber-600 border border-amber-200";
                        statusText = "學員申請預約中 (Requested)";
                        borderClass = "border-l-4 border-l-amber-500";
                    }

                    // 取得接課教練名單
                    const assignedNames = event.CoachNames ? String(event.CoachNames).split(',').filter(e=>e) : [];
                    const assignedIds = event.CoachIDs ? String(event.CoachIDs).split(',').filter(e=>e) : [];

                    // 生成時段卡片
                    const card = document.createElement('div');
                    card.className = `p-4 bg-slate-50 rounded-2xl shadow-sm border ${borderClass} space-y-3 relative`;

                    // 1. 卡片頂部
                    const cardHeader = `
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="font-bold text-slate-800 text-sm leading-tight">${event.CourseName || '教練授課空檔'}</h4>
                                <span class="text-[10px] px-2 py-0.5 rounded-md font-semibold inline-block mt-1.5 ${statusBadgeClass}">${statusText}</span>
                            </div>
                        </div>
                    `;
                    card.innerHTML += cardHeader;

                    // 2. 時段/地點/學員/教練資訊
                    const details = `
                        <div class="space-y-1.5 text-xs text-slate-600 pt-1">
                            <div class="flex items-center"><i class="fa-regular fa-clock w-5 text-slate-400"></i>時段：${event.TimeRange}</div>
                            <div class="flex items-center"><i class="fa-solid fa-location-dot w-5 text-slate-400"></i>場地：${event.Location || '尚未指派球場'}</div>
                            <div class="flex items-center"><i class="fa-solid fa-user-graduate w-5 text-slate-400"></i>預約學員：${event.StudentName || '待指派學員'}</div>
                            <div class="flex items-center"><i class="fa-solid fa-user-tie w-5 text-slate-400"></i>上課教練：${assignedNames.length > 0 ? assignedNames.join(', ') : '未指派教練'}</div>
                        </div>
                    `;
                    card.innerHTML += details;

                    // 3. 權限動態動作按鈕 (Action Buttons)
                    const actionsBox = document.createElement('div');
                    actionsBox.className = "flex flex-wrap gap-2 pt-2 border-t border-slate-200/50";

                    // A. 教練的操作 (接課 / 取消接課 / 簽到整合)
                    if (currentUser.Role === 'coach') {
                        // 1. 簽到功能 (Booked/Matched 且屬於此教練)
                        if (assignedIds.includes(currentUser.LineID)) {
                            // 顯示簽到按鈕
                            const btnSignIn = document.createElement('button');
                            btnSignIn.className = "bg-emerald-600 text-white text-xs font-semibold px-3 py-1.5 rounded-lg flex items-center space-x-1 hover:bg-emerald-700 active:scale-95 transition-all shadow-sm";
                            btnSignIn.innerHTML = `<i class="fa-solid fa-clipboard-user mr-1"></i>前往簽到`;
                            btnSignIn.onclick = () => executeSignIn(event.SlotID, currentUser.LineID);
                            actionsBox.appendChild(btnSignIn);

                            // 顯示取消接班
                            const btnCancel = document.createElement('button');
                            btnCancel.className = "bg-white border border-red-200 text-red-600 text-xs font-semibold px-3 py-1.5 rounded-lg hover:bg-red-50 active:scale-95 transition-all";
                            btnCancel.innerHTML = `<i class="fa-solid fa-ban mr-1"></i>取消接課`;
                            btnCancel.onclick = () => handleCancelClaim(event.SlotID);
                            actionsBox.appendChild(btnCancel);
                        } else {
                            // 還沒接，如果是 Open，教練可以接課
                            if (event.Status === 'Open') {
                                const btnClaim = document.createElement('button');
                                btnClaim.className = "bg-blue-600 text-white text-xs font-semibold px-3 py-1.5 rounded-lg flex items-center space-x-1 hover:bg-blue-700 active:scale-95 transition-all";
                                btnClaim.innerHTML = `<i class="fa-solid fa-hand-holding-hand mr-1"></i>我要接課`;
                                btnClaim.onclick = () => handleClaimSlot(event.SlotID, event.Location);
                                actionsBox.appendChild(btnClaim);
                            }
                        }
                    }

                    // B. 學員的操作 (可刪除自己的申請)
                    if (currentUser.Role === 'student' && event.CreatedBy === currentUser.LineID && event.Status === 'Requested') {
                        const btnDelete = document.createElement('button');
                        btnDelete.className = "bg-white border border-red-200 text-red-500 text-xs font-semibold px-3 py-1.5 rounded-lg hover:bg-red-50 active:scale-95 transition-all";
                        btnDelete.innerHTML = `<i class="fa-regular fa-trash-can mr-1"></i>撤回申請`;
                        btnDelete.onclick = () => handleDeleteSlot(event.SlotID);
                        actionsBox.appendChild(btnDelete);
                    }

                    // C. 系統管理員 (最高權限：審核申請、指派課程、刪除、簽到)
                    if (currentUser.Role === 'admin') {
                        // 1. 審核申請 (如果是 Requested)
                        if (event.Status === 'Requested') {
                            const btnApprove = document.createElement('button');
                            btnApprove.className = "bg-purple-600 text-white text-xs font-semibold px-3 py-1.5 rounded-lg hover:bg-purple-700 active:scale-95 transition-all";
                            btnApprove.innerHTML = `<i class="fa-solid fa-circle-check mr-1"></i>核准並開放教練接課`;
                            btnApprove.onclick = () => handleApproveRequest(event.SlotID);
                            actionsBox.appendChild(btnApprove);
                        }
                        // 2. 指派課程 (如果是 Available 教練空檔)
                        if (event.Status === 'Available') {
                            const btnAssign = document.createElement('button');
                            btnAssign.className = "bg-indigo-600 text-white text-xs font-semibold px-3 py-1.5 rounded-lg hover:bg-indigo-700 active:scale-95 transition-all";
                            btnAssign.innerHTML = `<i class="fa-solid fa-chalkboard-user mr-1"></i>指派學員課表`;
                            btnAssign.onclick = () => showAdminAssignModal(event.SlotID, event.Location);
                            actionsBox.appendChild(btnAssign);
                        }
                        // 3. 共用管理員刪除時段
                        const btnAdminDelete = document.createElement('button');
                        btnAdminDelete.className = "bg-white border border-slate-200 text-slate-500 hover:text-red-600 text-xs font-semibold px-3 py-1.5 rounded-lg hover:bg-slate-100 active:scale-95 transition-all";
                        btnAdminDelete.innerHTML = `<i class="fa-solid fa-trash-can mr-1"></i>刪除`;
                        btnAdminDelete.onclick = () => handleDeleteSlot(event.SlotID);
                        actionsBox.appendChild(btnAdminDelete);
                    }

                    if (actionsBox.children.length > 0) {
                        card.appendChild(actionsBox);
                    }

                    content.appendChild(card);
                });
            }

            // 執行平滑開啟動畫 (行動裝置 Bottom-sheet 動效)
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.querySelector('.bg-white').classList.remove('translate-y-full');
            }, 10);
        }

        function closeDateModal() {
            const modal = document.getElementById('dateModal');
            const sheet = modal.querySelector('.bg-white');
            sheet.classList.add('translate-y-full');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 200);
        }

        // ----------------------------------------------------
        // 7. 本月我的行程列表預覽
        // ----------------------------------------------------
        function renderUpcomingEvents() {
            const container = document.getElementById('upcomingEventsList');
            container.innerHTML = '';

            // 篩選與當前登入者有關的本月/未來時段
            const filtered = allEvents.filter(e => {
                const assignedIds = e.CoachIDs ? String(e.CoachIDs).split(',').filter(x=>x) : [];
                return currentUser.Role === 'admin' || 
                       e.CreatedBy === currentUser.LineID || 
                       assignedIds.includes(currentUser.LineID);
            }).sort((a,b) => String(a.Date).localeCompare(String(b.Date)) || String(a.TimeRange).localeCompare(String(b.TimeRange)));

            if (filtered.length === 0) {
                container.innerHTML = `<p class="text-xs text-slate-400 text-center py-4">本月無您相關的課程或空檔安排</p>`;
                return;
            }

            filtered.forEach(ev => {
                const row = document.createElement('div');
                row.className = "flex items-center justify-between p-3 bg-slate-50 hover:bg-slate-100 rounded-xl transition-all cursor-pointer border border-slate-100";
                row.setAttribute('onclick', `openDateModal('${formatGASDateString(ev.Date)}')`);

                let statusIcon = `<span class="w-2.5 h-2.5 rounded-full bg-blue-500 inline-block mr-2"></span>`;
                if (ev.Status === 'Full') statusIcon = `<span class="w-2.5 h-2.5 rounded-full bg-red-500 inline-block mr-2"></span>`;
                if (ev.Status === 'Available') statusIcon = `<span class="w-2.5 h-2.5 rounded-full bg-green-500 inline-block mr-2"></span>`;
                if (ev.Status === 'Requested') statusIcon = `<span class="w-2.5 h-2.5 rounded-full bg-amber-500 inline-block mr-2"></span>`;

                row.innerHTML = `
                    <div class="flex items-center min-w-0">
                        ${statusIcon}
                        <div class="min-w-0">
                            <p class="text-xs font-bold text-slate-800 truncate">${ev.CourseName || '教練空檔'}</p>
                            <p class="text-[10px] text-slate-500 mt-0.5">${formatGASDateString(ev.Date)} | ${ev.TimeRange}</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-300 text-xs pl-2"></i>
                `;
                container.appendChild(row);
            });
        }

        // 8. API 各種操作發送 (多端對接)

        // A. 註冊資料送出
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const role = document.getElementById('regRole').value;

            if (!name) return;

            try {
                Swal.showLoading();
                const res = await callGAS('register', {
                    LineID: currentUser.LineID,
                    Name: name,
                    Role: role
                });
                if (res.status === "success") {
                    Swal.fire({
                        icon: 'success',
                        title: '申請成功',
                        text: '資料已送出！請通知管理員審核您的帳號權限。',
                        confirmButtonText: '確定'
                    }).then(() => {
                        syncUserAndEvents();
                    });
                } else {
                    throw new Error(res.message);
                }
            } catch (error) {
                Swal.fire('申請失敗', error.message, 'error');
            }
        });

        function quickFillAvailability(dateStr) {
            closeDateModal();
            showSubmitAvailabilityModal();
            document.getElementById('availDate').value = dateStr;
        }

                CoachID: currentUser.LineID,
                CoachName: currentUser.Name,

                TimeRange: document.getElementById('availTimeRange').value.trim(),
                Location: document.getElementById('availLocation').value.trim()
            };

            try {

                    });

                    throw new Error(res.message);
                }
            } catch (err) {
                Swal.fire('提交失敗', err.message, 'error');
            }
        });

        // D. 學員：預約課程申請
        document.getElementById('studentRequestForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const payload = {
                CreatedBy: currentUser.LineID,
                CourseType: document.getElementById('reqCourseType').value,
                StudentName: document.getElementById('reqStudentName').value.trim(),
                Date: document.getElementById('reqDate').value,

        // G. 教練：我要接課操作 (ACID 與 LockService 保護)
        async function handleClaimSlot(slotId, currentLocation) {
            // 教練接單時，防超賣悲觀鎖由後端 LockService 實現
            const { value: selectedLocation } = await Swal.fire({
                title: '確認承接這堂課？',
                text: `請確認或修改上課球場：`,
                input: 'text',
                inputValue: currentLocation || '',
                inputPlaceholder: '請輸入確定上課球場',
                showCancelButton: true,
                confirmButtonColor: '#10b981',
                confirmButtonText: '確定接單',
                cancelButtonText: '取消',
                inputValidator: (value) => {
                    if (!value || !value.trim()) {
                        return '上課地點為必填規範！';
                    }
                }
            });

            if (selectedLocation) {
                try {
                    closeDateModal();
                    Swal.showLoading();
                    const res = await callGAS('claimSlot', {
                        SlotID: slotId,
                        CoachID: currentUser.LineID,
                        CoachName: currentUser.Name,
                        Location: selectedLocation

                        Swal.fire('接單成功', '您已成功登錄為此堂課教練！', 'success').then(() => {

        // K. 簽到系統整合 (Crucial Multi-Module Hook)
        // 使用 BookingID(SlotID) 與 CoachID 串接既有的教練簽到系統
        function executeSignIn(slotId, coachId) {
            // 在此帶入您原先完成好的簽到系統連結，或彈出相對應的模組
            // 這裡將以 BookingID (即 SlotID) 與 CoachID 當作參數跳轉
            const signInUrl = `https://your-liff-signin-system.example.com?bookingId=${slotId}&coachId=${coachId}`;
            
            Swal.fire({
                title: '準備前往簽到',
                html: `即將為時段 <b>${slotId}</b> 進行簽到認證。<br><br><span class="text-xs text-slate-400">正在傳輸 BookingID 與 CoachID 參數</span>`,
                icon: 'info',
                showCancelButton: true,
                confirmButtonColor: '#10b981',
                confirmButtonText: '確認跳轉簽到',
                cancelButtonText: '取消'
            }).then((result) => {
                if (result.isConfirmed) {
                    // 若在 LINE App 內，可用 liff.openWindow 或直接跳轉
                    if (liff.isInClient()) {
                        liff.openWindow({
                            url: signInUrl,
                            external: true
                        });
                    } else {
                        window.open(signInUrl, '_blank');
                    }
                }
            });
        }

        // ----------------------------------------------------
        // 9. 共用輔助功能
        // ----------------------------------------------------
        
        // POST 傳輸至後端 GAS Web App 的標準化函式
        async function callGAS(action, data) {
            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8' // GAS doPost 不支援標準 JSON 預檢，需用 text/plain 繞過 CORS
                    },
                    body: JSON.stringify({
                        action: action,
                        data: data
                    })
                });
                return await response.json();
            } catch (err) {
                console.error(`API ${action} 請求發送錯誤:`, err);
                throw new Error("無法連接至後端服務，請檢查網路連線或 GAS 網址。");
            }
        }

        // 標準化 GAS 日期字串轉換 (處理各種 JS Date 物件格式)
        function formatGASDateString(dateVal) {
            if (!dateVal) return "";
            const d = new Date(dateVal);
            if (isNaN(d.getTime())) {
                // 如果是 YYYY-MM-DD 字串
                return String(dateVal).split('T')[0];
            }
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        // 各種動態 Modal 控制
        function showRequestCourseModal() {
            document.getElementById('studentRequestModal').classList.remove('hidden');
            // 預設將日期設為明天
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('reqDate').value = tomorrow.toISOString().split('T')[0];
        }

        function showSubmitAvailabilityModal() {
            document.getElementById('coachAvailabilityModal').classList.remove('hidden');
            document.getElementById('availDate').value = new Date().toISOString().split('T')[0];
        }

        function showCreateSlotModal() {
            document.getElementById('adminCreateModal').classList.remove('hidden');
            document.getElementById('admDate').value = new Date().toISOString().split('T')[0];
        }

        function showAdminAssignModal(slotId, currentLocation) {
            document.getElementById('assignSlotId').value = slotId;

            document.getElementById('adminAssignModal').classList.remove('hidden');
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

    </script>
