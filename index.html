<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>匹克球排課系統</title>
  
  <link rel="preconnect" href="https://script.google.com">
  <link rel="preconnect" href="https://static.line-scdn.net">
  <link rel="preconnect" href="https://cdn.tailwindcss.com">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <style> #calendar { max-width: 100%; height: 80vh; margin: 0 auto; font-size: 0.9rem; } .fc-event { cursor: pointer; } </style>
</head>
<body class="bg-gray-50 text-gray-800">

  <datalist id="loc-options">
    <option value="宜蘭國民運動中心"></option>
    <option value="宜蘭運動公園光電風雨球場"></option>
  </datalist>

  <nav class="bg-blue-600 text-white p-4 flex justify-between items-center shadow-md">
    <h1 class="text-lg font-bold" id="nav-title">🎾 系統載入中...</h1>
    <div class="flex gap-2 items-center">
      <button id="applyCoachBtn" onclick="applyForCoach()" class="bg-white text-blue-600 px-3 py-1 rounded text-sm font-bold hidden shadow hover:bg-gray-100">申請成為教練</button>
      <select id="roleSelector" class="bg-blue-800 text-white text-sm rounded p-1 border border-blue-500 hidden" onchange="changeRole()"></select>
    </div>
  </nav>

  <div class="p-4"><div id="calendar" class="bg-white rounded-lg shadow-sm p-2 border border-gray-200 hidden"></div></div>
  
  <div id="loader" class="fixed inset-0 bg-gray-900 bg-opacity-80 flex flex-col justify-center items-center hidden z-50">
    <div class="animate-spin rounded-full h-14 w-14 border-t-4 border-b-4 border-blue-400 mb-4"></div>
    <p id="loader-text" class="text-white font-bold tracking-widest text-lg">處理中...</p>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyltbWiDAsOxuq0udv3xF0iyrEtDRHj9cY_irWlff1iOumR-gXzz0EqYN1DbeGbOS6_nw/exec';
    const LIFF_ID = '2010629884-Dil0QZ8F'; 

    let currentRole = 'student'; let realDBRole = ''; let dbStatus = ''; 
    let calendar; let myLineId = ''; let myCoachName = '';
    window.isProcessingFlag = false;
    window.initialEventsCache = null; 

    document.addEventListener('DOMContentLoaded', function() { initializeLiff(); });

    function initializeLiff() {
      showLoader("正在連線至 LINE 伺服器...");
      liff.init({ liffId: LIFF_ID }).then(() => {
        if (!liff.isLoggedIn()) liff.login();
        else {
          liff.getProfile().then(profile => {
            myLineId = profile.userId; myCoachName = profile.displayName;
            initSystemFast(); 
          }).catch(err => { hideLoader(); Swal.fire('錯誤', err.toString(), 'error'); });
        }
      }).catch(err => { hideLoader(); Swal.fire('LIFF 錯誤', err.toString(), 'error'); });
    }

    function initSystemFast() {
      updateLoaderText("正在同步資料庫與最新課表...");
      fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'initSystem', data: { LineID: myLineId } }) })
      .then(r => r.json()).then(res => {
        hideLoader();
        if (res.status === 'success') {
          const user = res.data.user;
          realDBRole = user.role; dbStatus = user.status;
          window.initialEventsCache = parseGasEvents(res.data.events); 
          buildRoleSelector();
          setupUI();
        }
      }).catch(err => { hideLoader(); Swal.fire('連線失敗', err.toString(), 'error'); });
    }

    function buildRoleSelector() {
      const sel = document.getElementById('roleSelector');
      sel.innerHTML = ''; 

      if (realDBRole === 'admin' && dbStatus === 'Approved') {
        sel.add(new Option('👑 總教練視角', 'admin')); sel.add(new Option('🏸 教練視角', 'coach')); sel.add(new Option('👨‍🎓 學員視角', 'student'));
        currentRole = 'admin'; sel.classList.remove('hidden');
      } else if (realDBRole === 'coach' && dbStatus === 'Approved') {
        sel.add(new Option('🏸 教練視角', 'coach')); sel.add(new Option('👨‍🎓 學員視角', 'student'));
        currentRole = 'coach'; sel.classList.remove('hidden');
      } else {
        currentRole = 'student';
        if (dbStatus === 'Pending') Swal.fire('審核中', '您的教練資格正在審核中，目前以學員身分瀏覽。', 'info');
        else document.getElementById('applyCoachBtn').classList.remove('hidden');
      }
      sel.value = currentRole;
    }

    function applyForCoach() {
      Swal.fire({ title: '申請成為教練', text: '送出後請通知總教練開通權限。', icon: 'info', showCancelButton: true, confirmButtonText: '確認送出' })
      .then((res) => {
        if (res.isConfirmed) {
          showLoader("正在送出申請...");
          fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'register', data: { LineID: myLineId, Name: myCoachName, Role: 'coach' } }) })
          .then(r => r.json()).then(res => { hideLoader(); Swal.fire('已送出', '請等待審核', 'success').then(()=>location.reload()); });
        }
      });
    }

    function setupUI() {
      document.getElementById('calendar').classList.remove('hidden');
      updateNavTitle(); initCalendar();
    }

    function updateNavTitle() {
      const roleName = { 'admin': '總教練', 'coach': '教練', 'student': '學員' }[currentRole];
      document.getElementById('nav-title').innerText = `🎾 ${myCoachName} (${roleName})`;
    }

    function changeRole() {
      currentRole = document.getElementById('roleSelector').value;
      updateNavTitle(); calendar.refetchEvents(); 
    }

    function parseGasEvents(dataList) {
      const events = [];
      dataList.forEach(slot => {
        if (!slot.Date || !slot.TimeRange) return; 
        const isAvailable = slot.Status === 'Available'; const isFull = slot.Status === 'Full'; const isReq = slot.Status === 'Requested';
        const dateStr = String(slot.Date).split('T')[0]; const timeParts = String(slot.TimeRange).split('-');
        if (!timeParts[0] || !timeParts[1]) return;
        const assignedNames = slot.AssignedCoachNames ? slot.AssignedCoachNames.split(',') : [];
        const assignedIds = slot.AssignedCoachIDs ? slot.AssignedCoachIDs.split(',') : [];
        
        events.push({
          id: slot.SlotID, 
          title: isReq ? `[審核中] ${slot.CourseName}\n學員: ${slot.StudentName.split(' ')[0]}` : (isAvailable ? `[可派課] ${assignedNames.join(',')}` : `${slot.CourseName}\n教練: ${assignedNames.join(',')} (${assignedNames.length}/${slot.RequiredCoaches})`),
          start: `${dateStr}T${timeParts[0]}`, end: `${dateStr}T${timeParts[1]}`,
          color: isReq ? '#8B5CF6' : (isAvailable ? '#F59E0B' : (isFull ? '#9CA3AF' : '#10B981')),
          extendedProps: { 
            courseName: slot.CourseName, studentName: slot.StudentName, location: slot.Location, 
            reqCoaches: slot.RequiredCoaches, currentCoaches: assignedNames.length, coachNames: assignedNames.join(','),
            status: slot.Status, assignedToMe: assignedIds.includes(myLineId), createdByMe: slot.CreatedBy === myLineId
          }
        });
      });
      return events;
    }

    function initCalendar() {
      if (calendar) calendar.destroy(); 
      var calendarEl = document.getElementById('calendar');
      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'timeGridWeek', headerToolbar: { left: 'prev,next', center: 'title', right: 'dayGridMonth,timeGridWeek' }, locale: 'zh-tw', allDaySlot: false, slotMinTime: "08:00:00", slotMaxTime: "22:00:00",
        events: function(info, successCallback, failureCallback) {
          if (window.initialEventsCache) {
            successCallback(window.initialEventsCache);
            window.initialEventsCache = null; 
            return;
          }
          showLoader("正在更新課表...");
          fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getCalendarEvents', data: { LineID: myLineId, Role: currentRole } }) })
          .then(r => r.json()).then(res => {
            hideLoader(); successCallback(parseGasEvents(res.data));
          }).catch(err => { hideLoader(); failureCallback(); });
        },

        dateClick: function(info) {
          if (window.isProcessingFlag) return; 
          let dateStr = info.dateStr; let defaultStart = "14:00"; let defaultEnd = "16:00";
          if (dateStr.includes('T')) { const d = new Date(dateStr); defaultStart = d.toTimeString().substring(0,5); defaultEnd = new Date(d.getTime()+7200000).toTimeString().substring(0,5); dateStr = dateStr.split('T')[0]; }

          if (currentRole === 'student') {
             Swal.fire({
              title: '預約上課申請', 
              html: `<select id="swal-type" class="swal2-input !mt-2"><option value="一對一">一對一</option><option value="一對二">一對二</option><option value="一對三">一對三</option><option value="一對四">一對四</option><option value="特殊團課">特殊團課</option></select><input type="text" id="swal-student" class="swal2-input !mt-2" placeholder="學員代表姓名 (必填)"><input type="tel" id="swal-phone" class="swal2-input !mt-2" placeholder="連絡電話 (必填)"><input type="date" id="swal-date" class="swal2-input !mt-2" value="${dateStr}"><div class="flex gap-2 mt-2"><input type="time" id="swal-start" class="swal2-input !mt-0 !w-1/2" value="${defaultStart}"><span>至</span><input type="time" id="swal-end" class="swal2-input !mt-0 !w-1/2" value="${defaultEnd}"></div><input list="loc-options" id="swal-loc" class="swal2-input !mt-2" placeholder="上課地點 (選填)">`, showCancelButton: true, confirmButtonText: '送出申請',
              preConfirm: () => {
                const v = { type: document.getElementById('swal-type').value, student: document.getElementById('swal-student').value.trim(), phone: document.getElementById('swal-phone').value.trim(), date: document.getElementById('swal-date').value, start: document.getElementById('swal-start').value, end: document.getElementById('swal-end').value, loc: document.getElementById('swal-loc').value.trim() };
                if(!v.student || !v.phone || !v.date || !v.start || !v.end) { Swal.showValidationMessage('請確實填寫必填欄位！'); return false; }
                if(v.start >= v.end) { Swal.fire('時間錯誤', '結束時間必須晚於起始時間', 'error'); return false; }
                return v;
              }
            }).then((res) => { if (res.isConfirmed) callApi('requestCourse', { CourseType: res.value.type, StudentName: res.value.student, Phone: res.value.phone, Date: res.value.date, TimeRange: `${res.value.start}-${res.value.end}`, Location: res.value.loc, CreatedBy: myLineId }, '申請已送出，請等候核准'); });
          }
          else if (currentRole === 'coach') {
             Swal.fire({
              title: '提報空檔', html: `<input type="date" id="swal-date" class="swal2-input !mt-0" value="${dateStr}"><div class="flex gap-2 mt-2"><input type="time" id="swal-start" class="swal2-input !mt-0 !w-1/2" value="${defaultStart}"><span>至</span><input type="time" id="swal-end" class="swal2-input !mt-0 !w-1/2" value="${defaultEnd}"></div><input list="loc-options" id="swal-loc" class="swal2-input !mt-2" placeholder="偏好地點 (選填)">`, showCancelButton: true, confirmButtonText: '送出空檔',
              preConfirm: () => ({ date: document.getElementById('swal-date').value, start: document.getElementById('swal-start').value, end: document.getElementById('swal-end').value, loc: document.getElementById('swal-loc').value.trim() })
            }).then((res) => { if (res.isConfirmed) callApi('submitAvailability', { Date: res.value.date, TimeRange: `${res.value.start}-${res.value.end}`, Location: res.value.loc, CoachID: myLineId, CoachName: myCoachName }, '空檔已送出'); });
          } else if (currentRole === 'admin') {
             Swal.fire({
              title: '發布課程', html: `<input type="text" id="swal-course" class="swal2-input !mt-2" placeholder="課程名稱 (必填)"><input type="text" id="swal-student" class="swal2-input !mt-2" placeholder="學員姓名 (必填)"><input type="number" id="swal-req" class="swal2-input !mt-2" placeholder="需求人數" value="1"><input type="date" id="swal-date" class="swal2-input !mt-2" value="${dateStr}"><div class="flex gap-2 mt-2"><input type="time" id="swal-start" class="swal2-input !mt-0 !w-1/2" value="${defaultStart}"><span>至</span><input type="time" id="swal-end" class="swal2-input !mt-0 !w-1/2" value="${defaultEnd}"></div><input list="loc-options" id="swal-loc" class="swal2-input !mt-2" placeholder="上課地點 (必填)">`, showCancelButton: true,
              preConfirm: () => {
                const v = { course: document.getElementById('swal-course').value.trim(), student: document.getElementById('swal-student').value.trim(), req: document.getElementById('swal-req').value, date: document.getElementById('swal-date').value, start: document.getElementById('swal-start').value, end: document.getElementById('swal-end').value, loc: document.getElementById('swal-loc').value.trim() };
                // 🔴 強制防呆：總教練排課若沒填地點，會被擋下來
                if(!v.course || !v.student || !v.date || !v.start || !v.end || !v.loc) { Swal.showValidationMessage('請確實填寫帶有 (必填) 的欄位！'); return false; }
                if(parseInt(v.req) <= 0) { Swal.showValidationMessage('需求人數必須大於 0'); return false; }
                if(v.start >= v.end) { Swal.fire('時間錯誤', '結束時間必須晚於起始時間', 'error'); return false; }
                return v;
              }
            }).then((res) => { if (res.isConfirmed) callApi('createSlot', { CourseName: res.value.course, StudentName: res.value.student, RequiredCoaches: res.value.req, Date: res.value.date, TimeRange: `${res.value.start}-${res.value.end}`, Location: res.value.loc, CreatedBy: myLineId }, '已發布'); });
          }
        },

        eventClick: function(info) {
          if (window.isProcessingFlag) return; 
          const ev = info.event; const p = ev.extendedProps;
          
          if (currentRole === 'student') {
             if (p.status === 'Requested') {
                Swal.fire({ title: '申請審核中', text: '請等候總教練核准與安排教練', icon: 'info', showDenyButton: true, showCancelButton: true, showConfirmButton: false, denyButtonText: '🗑️ 撤回申請', cancelButtonText: '關閉' }).then(res => { if(res.isDenied) callApi('deleteSlot', { SlotID: ev.id, OperatedBy: myLineId }, '已撤回申請'); });
             } else {
                Swal.fire({ title: '課程資訊', html: `課程: ${p.courseName}<br>地點: ${p.location || '安排中'}<br>教練: ${p.coachNames || '等待中'}`, icon: 'info' });
             }
          } else if (currentRole === 'coach') {
            if (p.status === 'Available' && p.createdByMe) {
               Swal.fire({ title: '取消提報', icon: 'info', showDenyButton: true, showCancelButton: true, showConfirmButton: false, denyButtonText: '🗑️ 取消', cancelButtonText: '關閉' }).then(res => { if(res.isDenied) callApi('deleteSlot', { SlotID: ev.id, OperatedBy: myLineId }, '已移除'); });
            } else if (p.assignedToMe) {
               Swal.fire({ title: '您的課程', text: `地點: ${p.location}`, icon: 'info', showDenyButton: true, showCancelButton: true, confirmButtonText: '✅ 簽到', denyButtonText: '❌ 取消接課', cancelButtonText: '關閉' }).then(res => { if (res.isConfirmed) Swal.fire('提示', `準備帶入簽到系統\nBookingID: ${ev.id}`, 'success'); else if (res.isDenied) callApi('cancelClaim', { SlotID: ev.id, CoachID: myLineId }, '已退課'); });
            } else if (p.status === 'Open') {
               Swal.fire({ 
                 title: '確認接課？', 
                 html: `
                   <div class="text-left text-sm mb-2 text-gray-700 border-b pb-2">課程：${p.courseName}<br>學員：${p.studentName.split(' ')[0]}<br>目前設定地點：${p.location || '尚未決定'}</div>
                   <div class="text-left text-sm font-bold text-red-600 mb-1 mt-3">請設定最終上課地點 (教練必填)：</div>
                   <input list="loc-options" id="swal-claim-loc" class="swal2-input !mt-0" placeholder="請點擊選擇或自行輸入" value="${p.location || ''}">
                 `,
                 icon: 'question', showCancelButton: true, confirmButtonText: '確定接課',
                 preConfirm: () => {
                   const loc = document.getElementById('swal-claim-loc').value.trim();
                   if (!loc) { Swal.showValidationMessage('請務必輸入或選擇上課地點！'); return false; }
                   return loc;
                 }
               }).then(res => { if (res.isConfirmed) claimSlot(ev.id, res.value); });
            } else { Swal.fire({ title: '課程已滿編', icon: 'warning' }); }
          } else if (currentRole === 'admin') { 
            if (p.status === 'Requested') {
               Swal.fire({ title: '學員預約審核', html: `<b>${p.courseName}</b><br>學員: ${p.studentName}<br>地點: ${p.location || '未定'}`, icon: 'question', showDenyButton: true, showCancelButton: true, confirmButtonText: '✅ 核准 (開放教練接課)', denyButtonText: '🗑️ 拒絕並刪除', cancelButtonText: '關閉' })
               .then(res => { if(res.isConfirmed) callApi('approveRequest', { SlotID: ev.id, OperatedBy: myLineId }, '已核准並開放接課'); else if(res.isDenied) callApi('deleteSlot', { SlotID: ev.id, OperatedBy: myLineId }, '已刪除申請'); });
            } else if (p.status === 'Available') {
               Swal.fire({ title: '指派課程', html: `<input type="text" id="assign-course" class="swal2-input !mt-0" placeholder="課程名稱 (必填)"><input type="text" id="assign-student" class="swal2-input" placeholder="學員姓名 (必填)"><input list="loc-options" id="assign-loc" class="swal2-input !mt-2" placeholder="上課地點 (必填)" value="${p.location || ''}">`, showCancelButton: true, preConfirm: () => {
                    const course = document.getElementById('assign-course').value.trim();
                    const student = document.getElementById('assign-student').value.trim();
                    const loc = document.getElementById('assign-loc').value.trim();
                    // 🔴 強制防呆：總教練派課給空檔時，如果沒填地點也會被擋下來
                    if(!course || !student || !loc) { Swal.showValidationMessage('請確實填寫所有必填欄位！'); return false; }
                    return { course, student, loc };
                 }
               })
               .then(res => { if(res.isConfirmed) callApi('assignCourseToAvailability', { SlotID: ev.id, CourseName: res.value.course, StudentName: res.value.student, Location: res.value.loc, OperatedBy: myLineId }, '指派成功'); });
            } else {
               Swal.fire({ title: '刪除排課', icon: 'warning', showDenyButton: true, showCancelButton: true, showConfirmButton: false, denyButtonText: '🗑️ 刪除' }).then(res => { if (res.isDenied) callApi('deleteSlot', { SlotID: ev.id, OperatedBy: myLineId }, '已刪除'); });
            }
          }
        }
      });
      calendar.render();
    }

    function callApi(actionName, payload, successMsg) {
      window.isProcessingFlag = true; showLoader("正在儲存資料..."); 
      fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: actionName, data: payload }) }).then(r => r.json()).then(res => { 
        window.isProcessingFlag = false; hideLoader(); 
        if(res.status === 'success') { Swal.fire('成功', successMsg, 'success'); calendar.refetchEvents(); } else Swal.fire('失敗', res.message, 'error');
      });
    }

    function claimSlot(slotId, locationStr) {
      callApi('claimSlot', { SlotID: slotId, CoachID: myLineId, CoachName: myCoachName, Location: locationStr }, '成功認領！');
    }

    function showLoader(text) { 
      if(text) document.getElementById('loader-text').innerText = text;
      document.getElementById('loader').classList.remove('hidden'); 
    }
    function updateLoaderText(text) { document.getElementById('loader-text').innerText = text; }
    function hideLoader() { document.getElementById('loader').classList.add('hidden'); }
  </script>
</body>
</html>
